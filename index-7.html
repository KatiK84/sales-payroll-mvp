<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sales Payroll MVP v0.7</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;font-size:14px;min-height:100vh}
.app{max-width:1260px;margin:0 auto;padding:20px 16px}
header h1{font-size:20px;font-weight:700}
header p{font-size:12px;color:#666;margin-top:3px;margin-bottom:18px}
.ua{background:#fff;border:2px dashed #c0cae0;border-radius:12px;padding:32px 24px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:16px}
.ua:hover,.ua.drag{border-color:#4f7fff}
.ua .ico{font-size:28px;margin-bottom:8px}
.ua p{font-size:13px;color:#555;margin-bottom:4px}
.ua .hint{font-size:11px;color:#aaa;margin-bottom:12px}
.bup{display:inline-block;background:#4f7fff;color:#fff;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500}
.panel{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:14px}
.tabs{display:flex;border-bottom:2px solid #eee;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:8px 14px;border:none;background:none;cursor:pointer;font-size:12px;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;font-weight:500}
.tab:hover{color:#4f7fff}.tab.active{color:#4f7fff;border-bottom-color:#4f7fff}
.pane{display:none}.pane.active{display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.card{background:#f7f9ff;border-radius:10px;padding:12px 14px;border:1px solid #e8ecf8}
.card.g{border-color:#a8e6b8;background:#f0fff4}.card.b{border-color:#93c5fd;background:#eff6ff}
.card.r{border-color:#ffb8b8;background:#fff4f4}.card.y{border-color:#fcd34d;background:#fffbeb}
.card.pp{background:#faf5ff;border-color:#d8b4fe}
.clbl{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.cval{font-size:19px;font-weight:700}.cval-sm{font-size:15px}
.card.g .cval{color:#1a7a3a}.card.b .cval{color:#1e40af}.card.r .cval{color:#c0392b}
.card.y .cval{color:#92400e}.card.pp .cval{color:#6d28d9}
.csub{font-size:10px;color:#aaa;margin-top:2px}
.mbx{background:#f7f9ff;border-radius:8px;padding:12px 14px;font-size:12px;border:1px solid #e8ecf8;margin-bottom:12px}
.mrow{display:flex;gap:10px;margin-bottom:4px}
.mk{color:#888;min-width:130px;flex-shrink:0}.mv{font-weight:500}
.ok-box{background:#f0fff4;border:1px solid #a8e6b8;border-radius:8px;padding:12px 14px;font-size:12px;color:#1a7a3a;margin-bottom:10px}
.warn-box{background:#fffbe6;border:1px solid #fcd34d;border-radius:8px;padding:12px 14px;font-size:12px;color:#7a5c00;margin-bottom:10px}
.eb{background:#fff4f4;border:1px solid #ffb0b0;border-radius:8px;padding:11px 14px;margin-bottom:10px;font-size:12px;color:#c0392b}
.eb h4{margin-bottom:6px;font-size:13px;font-weight:600}
.sbox{background:#f7f9ff;border-radius:10px;padding:13px;border:1px solid #e8ecf8}
.sh{font-size:13px;font-weight:600;color:#333;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid #eee}
.tw{overflow-x:auto;border-radius:8px;border:1px solid #eee;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#f7f9ff;padding:8px 10px;text-align:left;font-weight:600;color:#555;border-bottom:2px solid #eee;white-space:nowrap}
tbody td{padding:7px 10px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f9fbff}
.total-row{background:#f0fff4;font-weight:600}
.total-lbl{text-align:right;padding-right:14px;color:#666;font-size:11px}
.rule-col{color:#666;font-size:11px;max-width:220px;white-space:normal}
.bonus-det{color:#1e40af}.no-sales{font-size:10px;color:#aaa}
.pill{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;white-space:nowrap}
.py{background:#fff3cd;color:#856404}.pg{background:#d1f7e0;color:#1a7a3a}
.pgr{background:#f0f0f0;color:#666}.pb{background:#dbeafe;color:#1e40af}
.pp{background:#ede9fe;color:#6d28d9}.pr{background:#fee2e2;color:#b91c1c}
.fs{background:linear-gradient(135deg,#f0fff4,#e8f4fd);border:1px solid #a8d8b8;border-radius:10px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.fsv{font-size:22px;font-weight:700;color:#1a7a3a}.fsl{font-size:11px;color:#4a9a6a;margin-bottom:2px}.fsi{font-size:12px;color:#666}
.spin{width:24px;height:24px;border:3px solid #eee;border-top-color:#4f7fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 8px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:26px;color:#888;font-size:12px}
.mono{font-family:monospace;font-size:11px}
.tg{color:#1a7a3a;font-weight:600}.tm{color:#aaa}.text-blue{color:#1e40af;font-weight:600}.fw{font-weight:700}
.btn{padding:6px 13px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;border:1.5px solid}
.btn-primary{background:#4f7fff;color:#fff;border-color:#4f7fff}.btn-primary:hover{background:#3a6aee}
.btn-secondary{background:#fff;color:#444;border-color:#d0d4e0}.btn-secondary:hover{background:#f5f6fa}
.btn-danger{background:#fff;color:#c0392b;border-color:#ffb0b0}.btn-danger:hover{background:#fff4f4}
.btn-success{background:#1a7a3a;color:#fff;border-color:#1a7a3a;padding:8px 16px}.btn-success:hover{background:#145c2c}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:5px}
.dir-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.dir-toolbar h2{font-size:13px;font-weight:600;flex:1}
.mgr-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:11px}
.mce{background:#f9fafb;border:1.5px solid #e0e4ec;border-radius:10px;padding:13px 14px;position:relative}
.mce:hover{border-color:#b0bce0}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
.frow.full{grid-template-columns:1fr}
.fld label{display:block;font-size:10px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.fld input,.fld select{width:100%;border:1px solid #d0d4e0;border-radius:6px;padding:5px 8px;font-size:12px;background:#fff;color:#1a1a2e;outline:none}
.fld input:focus,.fld select:focus{border-color:#4f7fff}
.fld input:disabled,.fld select:disabled{background:#f5f5f5;color:#bbb;cursor:not-allowed}
.card-actions{display:flex;gap:6px;margin-top:9px;justify-content:flex-end;border-top:1px solid #eee;padding-top:9px}
.toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:8px 12px;border-radius:8px}
.toggle-row.active-on{background:#f0fff4;border:1px solid #a8e6b8}
.toggle-row.active-off{background:#fff4f4;border:1px solid #ffb0b0}
.toggle-lbl{font-size:12px;font-weight:600;flex:1}
.toggle-lbl.on{color:#1a7a3a}.toggle-lbl.off{color:#c0392b}
.toggle-btn{position:relative;width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;flex-shrink:0;transition:background .2s}
.toggle-btn.on{background:#34c759}.toggle-btn.off{background:#ccc}
.toggle-btn::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;transition:left .2s}
.toggle-btn.on::after{left:23px}.toggle-btn.off::after{left:3px}
.bonus-section{margin-top:10px;padding-top:10px;border-top:1px dashed #ddd}
.bonus-section-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bonus-section-hdr span{font-size:10px;font-weight:700;color:#1e40af;text-transform:uppercase;letter-spacing:.04em;flex:1}
.bonus-step{display:grid;grid-template-columns:1fr 1fr auto;gap:6px;margin-bottom:6px;align-items:center}
.bonus-step input{border:1px solid #d0d4e0;border-radius:6px;padding:5px 8px;font-size:12px;background:#fff;width:100%;outline:none}
.bonus-step input:focus{border-color:#1e40af}
.bonus-del{background:none;border:none;cursor:pointer;color:#c0392b;font-size:14px;padding:2px 4px}
.bonus-add{font-size:11px;color:#1e40af;background:none;border:1px solid #bfdbfe;border-radius:5px;padding:4px 10px;cursor:pointer}
.bonus-add:hover{background:#eff6ff}
.history-list{display:flex;flex-direction:column;gap:10px}
.hist-card{background:#f7f9ff;border:1.5px solid #e0e4ec;border-radius:10px;padding:14px 16px;cursor:pointer;transition:border-color .15s}
.hist-card:hover{border-color:#4f7fff}.hist-card.hist-open{border-color:#4f7fff;background:#f0f4ff}
.hist-head{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.hist-head strong{font-size:14px}.hist-date{font-size:11px;color:#aaa;flex:1}
.hist-stats{display:flex;gap:16px;font-size:12px;flex-wrap:wrap}.hist-meta{color:#aaa;font-size:11px}
.period-detail{background:#fff;border:1px solid #e0e4ec;border-radius:10px;padding:16px;margin-top:8px}
.tprov{color:#7c3aed;font-weight:600}
.prov-det{color:#7c3aed;font-size:10px}
.prov-section{margin-top:10px;padding-top:10px;border-top:1px dashed #c4b5fd;background:#faf5ff;border-radius:8px;padding:10px 12px}
.prov-section-hdr{font-size:10px;font-weight:700;color:#7c3aed;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.sub-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.sub-tab{padding:5px 12px;border:1.5px solid #d0d4e0;border-radius:6px;cursor:pointer;font-size:11px;font-weight:500;color:#666;background:#fff}
.sub-tab:hover{border-color:#4f7fff;color:#4f7fff}
.sub-tab.active{background:#4f7fff;border-color:#4f7fff;color:#fff}
.joint-dialog{background:#fff;border:1.5px solid #bfdbfe;border-radius:10px;padding:14px 16px}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>💰 Sales Payroll MVP</h1>
    <p>v0.7 · Фикс + Бонус + Провизион (pipeline) + Дедупликация + История · Frontend only</p>
  </header>

  <div class="ua" id="ua" onclick="document.getElementById('fi').click()">
    <div class="ico">📂</div>
    <p>Загрузите Excel-файл отчёта по поступлениям (для расчёта фикса)</p>
    <p class="hint">.xlsx — выгрузка из ERP/1С</p>
    <input type="file" id="fi" accept=".xlsx,.xls" style="display:none" onchange="if(this.files[0])loadXLSX(this.files[0])">
    <span class="bup" onclick="event.stopPropagation();document.getElementById('fi').click()">Выбрать файл</span>
  </div>

  <div class="panel" id="mainPanel">
    <div class="tabs" id="mainTabs">
      <button class="tab active" data-tab="overview">Обзор</button>
      <button class="tab" data-tab="fixed">🧮 Реестр выплат</button>
      <button class="tab" data-tab="prov">📦 Провизион</button>
      <button class="tab" data-tab="dedup">🔍 Дубли оплат</button>
      <button class="tab" data-tab="history">📅 История</button>
      <button class="tab" data-tab="dir">⚙️ Менеджеры</button>
      <button class="tab" data-tab="preview">Предпросмотр</button>
      <button class="tab" data-tab="structure">Структура</button>
    </div>
    <div class="pane active" id="pane-overview"><div id="overviewContent"></div></div>
    <div class="pane" id="pane-fixed"><div id="fpc"></div></div>
    <div class="pane" id="pane-prov">
      <div class="sub-tabs">
        <button class="sub-tab active" onclick="switchProvTab('deals')">Реестр сделок</button>
        <button class="sub-tab" onclick="switchProvTab('settings')">Настройки платформ</button>
      </div>
      <div id="provContent"></div>
      <div id="provSettingsContent" style="display:none"></div>
    </div>
    <div class="pane" id="pane-dedup"><div id="dedupContent"></div></div>
    <div class="pane" id="pane-history"><div id="historyContent"></div></div>
    <div class="pane" id="pane-dir"><div id="dirc"></div></div>
    <div class="pane" id="pane-preview"><div id="pvc"></div></div>
    <div class="pane" id="pane-structure"><div id="stc"></div></div>
  </div>

  <!-- Provizion always visible panel -->
  <div class="panel" id="provPanel">
    <div class="sub-tabs">
      <button class="sub-tab active" onclick="switchProvTab('deals')">📦 Реестр сделок JTL</button>
      <button class="sub-tab" onclick="switchProvTab('settings')">⚙️ Настройки платформ</button>
    </div>
    <div id="provContent2"></div>
    <div id="provSettingsContent2" style="display:none"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ═══ config.js ═══
// ── Column mapping for ERP/1С report ─────────────────────────────────
// Adjust these if the report format changes
const COL = {
  date:         0,
  counterpart:  3,
  manager:      4,   // "Менеджер по продажам"
  article:      7,
  name:         8,
  qty:          12,
  received:     14,  // "Полученная сумма на расчётный счёт"
  goodsNoVat:   15,  // "За товар без НДС" ← FIXED SALARY BASE
  serviceNoVat: 16,  // "За услуги без НДС"
  vat:          17,
  total:        18,
};

// ── Default managers directory ────────────────────────────────────────
const DEFAULT_MANAGERS = [
  {
    manager_name: "David K.",
    активен: true,
    режим_фикса: "по группе",
    группа_фикса: "удалённый менеджер",
    тип_занятости: "полная занятость",
    бонусы: [{ планка: 35000, бонус: 200 }, { планка: 40000, бонус: 300 }],
    настройки_провизиона: {
      тип_ставки: "фиксированный процент",
      процент: 4,
      есть_порог: true,
      минимум_поступлений: 25000,
      логика_порога: "считать только с суммы сверх порога"
    }
  },
  {
    manager_name: "Leonid S",
    активен: true,
    режим_фикса: "по группе",
    группа_фикса: "удалённый менеджер",
    тип_занятости: "частичная занятость",
    бонусы: [],
    настройки_провизиона: null
  },
  {
    manager_name: "Volodymyr",
    активен: true,
    режим_фикса: "по группе",
    группа_фикса: "фикс независимо от поступлений",
    тип_занятости: "полная занятость",
    бонусы: [],
    настройки_провизиона: null
  },
  {
    manager_name: "Volodymyr ",
    активен: true,
    режим_фикса: "по группе",
    группа_фикса: "фикс независимо от поступлений",
    тип_занятости: "полная занятость",
    бонусы: [],
    настройки_провизиона: null
  },
  {
    manager_name: "B2B Allianz",
    активен: true,
    режим_фикса: "по группе",
    группа_фикса: "без оклада",
    тип_занятости: "полная занятость",
    бонусы: [],
    настройки_провизиона: null
  }
];

// ═══ storage.js ═══
// ── Storage keys ──────────────────────────────────────────────────────
const KEYS = {
  managers:   'spm_managers',
  dedup:      'spm_dedup',      // Set of payment keys already counted
  history:    'spm_history',    // Array of saved period calculations
};

// ── Managers ──────────────────────────────────────────────────────────
function loadManagers() {
  try {
    const raw = localStorage.getItem(KEYS.managers);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_MANAGERS));
}

function saveManagers(arr) {
  localStorage.setItem(KEYS.managers, JSON.stringify(arr));
}

// ── Dedup registry ────────────────────────────────────────────────────
// Stored as array of keys (Set doesn't serialize well)
function loadDedupRegistry() {
  try {
    const raw = localStorage.getItem(KEYS.dedup);
    if (raw) return new Set(JSON.parse(raw));
  } catch(e) {}
  return new Set();
}

function saveDedupRegistry(set) {
  localStorage.setItem(KEYS.dedup, JSON.stringify([...set]));
}

// Build a dedup key for a single payment row
function buildDedupKey(row) {
  // Composite: date|manager|counterpart|docBasis|received|goodsNoVat
  const parts = [
    String(row.date || '').substring(0, 10),
    String(row.manager || '').trim(),
    String(row.counterpart || '').trim(),
    String(row.document || '').trim(),
    String(Math.round((row.received || 0) * 100)),
    String(Math.round((row.goodsNoVat || 0) * 100)),
  ];
  return parts.join('|');
}

// ── Period history ────────────────────────────────────────────────────
function loadHistory() {
  try {
    const raw = localStorage.getItem(KEYS.history);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return [];
}

function saveHistory(arr) {
  localStorage.setItem(KEYS.history, JSON.stringify(arr));
}

function savePeriod(periodData) {
  const history = loadHistory();
  // Replace existing entry for same month/year if present
  const key = `${periodData.year}-${String(periodData.month).padStart(2,'0')}`;
  const idx = history.findIndex(h => `${h.year}-${String(h.month).padStart(2,'0')}` === key);
  if (idx >= 0) history[idx] = periodData;
  else history.unshift(periodData); // newest first
  // Keep last 24 periods
  saveHistory(history.slice(0, 24));
}

function clearStorage() {
  localStorage.removeItem(KEYS.managers);
  localStorage.removeItem(KEYS.dedup);
  localStorage.removeItem(KEYS.history);
}

// ── Provizion deal registry ───────────────────────────────────────────
function loadDeals() {
  try { const r = localStorage.getItem('spm_deals'); if (r) return JSON.parse(r); } catch(e) {}
  return [];
}
function saveDeals(arr) { localStorage.setItem('spm_deals', JSON.stringify(arr)); }

// ── Deal dedup registry ───────────────────────────────────────────────
function loadDealDedup() {
  try { const r = localStorage.getItem('spm_deal_dedup'); if (r) return new Set(JSON.parse(r)); } catch(e) {}
  return new Set();
}
function saveDealDedup(set) { localStorage.setItem('spm_deal_dedup', JSON.stringify([...set])); }

// ── Provizion settings ────────────────────────────────────────────────
const DEFAULT_PROV_SETTINGS = {
  excludedPlatforms: ['Ebay-Kleinanzeigen_MGH','B-Stock','Troostwijk','Restado','Faire'],
};
function loadProvSettings() {
  try { const r = localStorage.getItem('spm_prov_settings'); if (r) return JSON.parse(r); } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_PROV_SETTINGS));
}
function saveProvSettings(obj) { localStorage.setItem('spm_prov_settings', JSON.stringify(obj)); }

// ═══ payroll.js ═══
// ── Helpers ───────────────────────────────────────────────────────────
function excelDateToStr(serial) {
  const d = new Date(Math.round((serial - 25569) * 86400 * 1000));
  const dd = String(d.getUTCDate()).padStart(2,'0');
  const mm = String(d.getUTCMonth()+1).padStart(2,'0');
  return `${dd}.${mm}.${d.getUTCFullYear()}`;
}

const s = v => {
  if (v == null) return '';
  if (typeof v === 'number' && v > 40000 && v < 70000) return excelDateToStr(v);
  return String(v).trim();
};
const n = v => {
  if (v == null || v === '') return 0;
  const x = parseFloat(String(v).replace(',','.'));
  return isNaN(x) ? 0 : x;
};
const fmt = v => {
  if (!v && v !== 0) return '—';
  if (v === 0) return '0,00';
  return v.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
};

// ── Row classification ────────────────────────────────────────────────
function classifyRow(row) {
  const f = s(row[0]);
  const nn = row.filter(v => v !== null && v !== '').length;
  if (nn === 0) return 'empty';
  if (f.includes('Data parameters') || f.includes('Дата начала') ||
      f.includes('Дата окончания') || f.includes('Filter:')) return 'service';
  if (f === 'Фонд' || f === 'Документ' || f === 'Дата') return 'header';
  if (row.some(v => s(v) === 'Документ основание')) return 'header';
  if (f === 'Total' || f === 'Итого') return 'total';
  if (/^0\d\s+фонд\s+/i.test(f)) return 'group';
  if (/Поступление на расчетный счет\s+\d+/i.test(f)) return 'doc_bank';
  if (/ПКО\s+[A-Z]+\d+/i.test(f)) return 'doc_cash';
  if (/^\d{2}\.\d{2}\.\d{4}/.test(f)) return 'data';
  return 'unknown';
}

function extractMeta(raw) {
  const m = {};
  raw.slice(0, 10).forEach(row => {
    const r = row.map(s).join(' ');
    const a = r.match(/Дата начала[:\s]+(\d{2}\.\d{2}\.\d{4})/);
    const b = r.match(/Дата окончания[:\s]+(\d{2}\.\d{2}\.\d{4})/);
    if (a) m.start = a[1];
    if (b) m.end = b[1];
    if (r.includes('фонд GH')) m.fund = '01 фонд GH';
  });
  // Auto-detect month/year from start date
  if (m.start) {
    const parts = m.start.split('.');
    m.month = parseInt(parts[1], 10);
    m.year  = parseInt(parts[2], 10);
  }
  return m;
}

// ── Build flat data rows from raw XLSX ───────────────────────────────
function buildDataRows(raw) {
  const rows = [];
  let fund = '', doc = '', docType = '';
  for (let i = 0; i < raw.length; i++) {
    const row = raw[i], t = classifyRow(row);
    if (t === 'group')    { fund = s(row[0]); }
    if (t === 'doc_bank') { doc = s(row[0]); docType = 'bank'; }
    if (t === 'doc_cash') { doc = s(row[0]); docType = 'cash'; }
    if (t === 'data') {
      const art     = s(row[COL.article]);
      const svcNoVat = n(row[COL.serviceNoVat]);
      const gdsNoVat = n(row[COL.goodsNoVat]);
      rows.push({
        fund, document: doc, docType,
        date:         s(row[COL.date]),
        counterpart:  s(row[COL.counterpart]),
        manager:      s(row[COL.manager]),
        article:      art,
        name:         s(row[COL.name]),
        qty:          n(row[COL.qty]),
        received:     n(row[COL.received]),
        goodsNoVat:   gdsNoVat,
        serviceNoVat: svcNoVat,
        isService:    art.includes('EUPL') || (svcNoVat > 0 && gdsNoVat === 0),
      });
    }
  }
  return rows;
}

// ── Deduplication ─────────────────────────────────────────────────────
function deduplicateRows(rows, dedupRegistry) {
  const fresh = [], dupes = [];
  const sessionKeys = new Set(); // track within this file too

  rows.forEach(row => {
    const key = buildDedupKey(row);
    if (dedupRegistry.has(key) || sessionKeys.has(key)) {
      dupes.push({ ...row, dedupKey: key });
    } else {
      sessionKeys.add(key);
      fresh.push({ ...row, dedupKey: key });
    }
  });
  return { fresh, dupes };
}

// ── Aggregate by manager ──────────────────────────────────────────────
function aggregateByManager(rows) {
  const m = {};
  rows.forEach(r => {
    const k = r.manager || '(не указан)';
    if (!m[k]) m[k] = { name: k, rows: [], totalReceived: 0, goodsSum: 0, docs: new Set() };
    m[k].rows.push(r);
    m[k].totalReceived += r.received || 0;
    m[k].goodsSum      += r.goodsNoVat || 0;
    if (r.document) m[k].docs.add(r.document);
  });
  return Object.values(m).sort((a, b) => b.totalReceived - a.totalReceived);
}

// ── Fixed salary rules ────────────────────────────────────────────────
function calcFixed(entry, base) {
  const mode = entry['режим_фикса'];
  if (!mode) return { fixed: 0, rule: 'Не указан режим_фикса', isErr: true };

  if (mode === 'вручную') {
    const sal = entry['ручной_фиксированный_оклад'];
    if (sal === undefined || sal === null || sal === '')
      return { fixed: 0, rule: 'вручную: не указан ручной_фиксированный_оклад', isErr: true };
    const sn = parseFloat(sal);
    if (isNaN(sn)) return { fixed: 0, rule: 'вручную: оклад не число', isErr: true };
    const thr = entry['минимальный_порог'];
    const hasThr = thr !== null && thr !== undefined && thr !== '' && thr !== 'нет';
    if (hasThr) {
      const tn = parseFloat(thr);
      if (isNaN(tn)) return { fixed: 0, rule: 'вручную: порог не число', isErr: true };
      return base >= tn
        ? { fixed: sn, rule: `вручную: ${sn}, порог ${fmt(tn)} → выплачено`, isErr: false }
        : { fixed: 0,  rule: `вручную: ${sn}, порог ${fmt(tn)} → не достигнут (${fmt(base)})`, isErr: false };
    }
    return { fixed: sn, rule: `вручную: ${sn}, порог нет → выплачено`, isErr: false };
  }

  if (mode === 'по группе') {
    const g = entry['группа_фикса'], et = entry['тип_занятости'];
    if (!g) return { fixed: 0, rule: 'по группе: не указана группа_фикса', isErr: true };
    if (!et && g !== 'без оклада')
      return { fixed: 0, rule: 'по группе: не указан тип_занятости', isErr: true };

    if (g === 'без оклада') return { fixed: 0, rule: 'без оклада → 0', isErr: false };

    if (g === 'фикс независимо от поступлений') {
      if (et === 'полная занятость')    return { fixed: 800, rule: 'фикс всегда, полная занятость → 800', isErr: false };
      if (et === 'частичная занятость') return { fixed: 400, rule: 'фикс всегда, частичная занятость → 400', isErr: false };
      return { fixed: 0, rule: `неизвестный тип_занятости: "${et}"`, isErr: true };
    }

    if (g === 'удалённый менеджер') {
      if (et === 'полная занятость')
        return base >= 10000
          ? { fixed: 800, rule: `полная занятость ≥ 10 000 → 800`, isErr: false }
          : { fixed: 400, rule: `полная занятость < 10 000 → 400 (база: ${fmt(base)})`, isErr: false };
      if (et === 'частичная занятость')
        return base >= 5000
          ? { fixed: 400, rule: `частичная занятость ≥ 5 000 → 400`, isErr: false }
          : { fixed: 200, rule: `частичная занятость < 5 000 → 200 (база: ${fmt(base)})`, isErr: false };
      return { fixed: 0, rule: `неизвестный тип_занятости: "${et}"`, isErr: true };
    }

    return { fixed: 0, rule: `неизвестная группа_фикса: "${g}"`, isErr: true };
  }

  return { fixed: 0, rule: `неизвестный режим_фикса: "${mode}"`, isErr: true };
}

// ── Bonus rules ───────────────────────────────────────────────────────
function calcBonus(entry, base) {
  const steps = entry['бонусы'];
  if (!steps || !Array.isArray(steps) || steps.length === 0)
    return { bonus: 0, detail: '', bonusSteps: [], errs: [] };

  const errs = [], bonusSteps = [];
  let total = 0;

  steps.forEach((step, i) => {
    const pl = parseFloat(step['планка']);
    const bn = parseFloat(step['бонус']);
    if (isNaN(pl)) { errs.push(`ступень ${i+1}: планка не число`); return; }
    if (isNaN(bn)) { errs.push(`ступень ${i+1}: бонус не число`);  return; }
    const reached = base >= pl;
    bonusSteps.push({ планка: pl, бонус: bn, reached });
    if (reached) total += bn;
  });

  const detail = bonusSteps.filter(s => s.reached)
    .map(s => `${fmt(s.планка)} → +${fmt(s.бонус)}`).join('; ');

  return { bonus: total, detail, bonusSteps, errs };
}

// ── Main payroll calculation ──────────────────────────────────────────
function runPayroll(raw, managers, dedupRegistry) {
  const allTypes  = raw.map(r => classifyRow(r));
  const meta      = extractMeta(raw);
  const allRows   = buildDataRows(raw);

  // Dedup
  const { fresh, dupes } = deduplicateRows(allRows, dedupRegistry);

  // Aggregate fresh rows only
  const agg = aggregateByManager(fresh.filter(r => !r.isService));
  const inReport = new Set(agg.map(m => m.name.trim()));

  const results = [], errors = [], provErrors = [];

  // Process managers present in report
  agg.forEach(m => {
    const entry = managers.find(d => d.manager_name.trim() === m.name.trim());
    if (!entry) {
      errors.push({ manager: m.name, issue: 'Не найден в справочнике менеджеров', base: m.goodsSum });
      return;
    }
    if (entry['активен'] === false) return;

    const fr = calcFixed(entry, m.goodsSum);
    if (fr.isErr) { errors.push({ manager: m.name, issue: fr.rule, base: m.goodsSum }); return; }

    const br = calcBonus(entry, m.goodsSum);
    br.errs.forEach(e => errors.push({ manager: m.name, issue: 'Бонус: ' + e, base: m.goodsSum }));

    // Provizion base: sum of JTL-approved deals for this manager
    const provBase = (typeof PROV !== 'undefined')
      ? PROV.deals
          .filter(d => (d.status === 'автоматически_закрыта' || d.status === 'подтверждена_вручную' || d.status === 'совместная' || d.status === 'учтена_в_провизионе')
                    && d.verkaeufer && d.verkaeufer.trim() === m.name.trim())
          .reduce((s, d) => {
            if (d.status === 'совместная' && d.jointDeal) {
              const share = d.jointDeal.shares.find(sh => sh.manager.trim() === m.name.trim());
              return s + (share ? d.gesamtbetrag * share.percent / 100 : 0);
            }
            return s + (d.gesamtbetrag || 0);
          }, 0)
      : 0;

    const pr = calcProvizion(entry, provBase, m.totalReceived);
    if (pr.isErr) {
      provErrors.push({ manager: m.name, issue: pr.rule, provBase, receipts: m.totalReceived });
    }

    const thr = entry['минимальный_порог'];
    const td  = (!thr && thr !== 0) ? 'нет' : fmt(parseFloat(thr));

    results.push({
      manager:      m.name,
      mode:         entry['режим_фикса'] || '—',
      group:        entry['группа_фикса'] || '—',
      empType:      entry['тип_занятости'] || '—',
      base:         m.goodsSum,
      received:     m.totalReceived,
      threshold:    td,
      fixedSalary:  fr.fixed,
      bonus:        br.bonus,
      bonusDetail:  br.detail,
      bonusSteps:   br.bonusSteps,
      provBase:     provBase,
      provizion:    pr.isErr ? 0 : pr.provizion,
      provRule:     pr.rule,
      provConfigured: !pr.isErr,
      total:        fr.fixed + br.bonus + (pr.isErr ? 0 : pr.provizion),
      rule:         fr.rule,
      rows:         m.rows,
      inReport:     true,
    });
  });

  // Active managers not in report (base = 0) — still get fixed salary if applicable
  managers.forEach(entry => {
    if (entry['активен'] === false) return;
    if (!entry.manager_name || !entry.manager_name.trim()) return;
    if (inReport.has(entry.manager_name.trim())) return;

    const fr = calcFixed(entry, 0);
    if (fr.isErr) { errors.push({ manager: entry.manager_name, issue: fr.rule + ' (нет в отчёте)', base: 0 }); return; }
    if (fr.fixed === 0) return;

    const thr = entry['минимальный_порог'];
    const td  = (!thr && thr !== 0) ? 'нет' : fmt(parseFloat(thr));

    results.push({
      manager:      entry.manager_name,
      mode:         entry['режим_фикса'] || '—',
      group:        entry['группа_фикса'] || '—',
      empType:      entry['тип_занятости'] || '—',
      base:         0,
      received:     0,
      threshold:    td,
      fixedSalary:  fr.fixed,
      bonus:        0,
      bonusDetail:  '',
      bonusSteps:   [],
      provizion:    0,
      provBase:     0,
      provRule:     'нет продаж в периоде',
      provConfigured: false,
      total:        fr.fixed,
      rule:         fr.rule + ' (нет продаж в периоде)',
      rows:         [],
      inReport:     false,
    });
  });

  return { meta, allTypes, allRows, fresh, dupes, results, errors, provErrors };
}


// ── Provizion calculation ─────────────────────────────────────────────
function calcProvizion(entry, provBase, monthlyReceipts) {
  const ps = entry['настройки_провизиона'];

  // Not configured → skip silently (show in errors upstream)
  if (!ps) return { provizion: 0, rule: 'провизион не настроен', isErr: true };

  const rateType = ps['тип_ставки'];
  if (!rateType) return { provizion: 0, rule: 'не указан тип_ставки провизиона', isErr: true };

  const pct = parseFloat(ps['процент']);
  if (isNaN(pct) || pct < 0) return { provizion: 0, rule: 'процент провизиона не задан или некорректен', isErr: true };

  const hasThreshold = ps['есть_порог'] === true;
  let effectiveBase = provBase;
  let thresholdNote = '';

  if (hasThreshold) {
    const minReceipts = parseFloat(ps['минимум_поступлений']);
    if (isNaN(minReceipts) || minReceipts < 0) {
      return { provizion: 0, rule: 'есть_порог = true, но минимум_поступлений не задан или некорректен', isErr: true };
    }
    const thresholdMet = monthlyReceipts >= minReceipts;
    if (thresholdMet) {
      thresholdNote = `порог ${fmt(minReceipts)} EUR достигнут (поступления: ${fmt(monthlyReceipts)}) → `;
    } else {
      // Threshold not met: calculate only on amount above threshold
      const logic = ps['логика_порога'] || 'считать только с суммы сверх порога';
      if (logic === 'считать только с суммы сверх порога') {
        const excess = Math.max(0, provBase - minReceipts);
        effectiveBase = excess;
        thresholdNote = `порог ${fmt(minReceipts)} EUR не достигнут (${fmt(monthlyReceipts)}), провизион только с суммы сверх порога (${fmt(excess)}) → `;
      } else {
        // со всей базы
        thresholdNote = `порог ${fmt(minReceipts)} EUR не достигнут, считать со всей базы → `;
      }
    }
  }

  const amount = Math.round(effectiveBase * pct / 100 * 100) / 100;
  const rateLabel = rateType === 'фиксированный процент' ? `фикс. ${pct}%` : `инд. ${pct}%`;
  const rule = `${thresholdNote}${rateLabel} от ${fmt(effectiveBase)} = ${fmt(amount)} EUR`;

  return { provizion: amount, rule, isErr: false, pct, effectiveBase };
}

// ═══ provizion.js ═══
// ══════════════════════════════════════════════════════════════════════
// PROVIZION MODULE — JTL Pipeline
// ══════════════════════════════════════════════════════════════════════

// ── JTL column mapping ────────────────────────────────────────────────
const JTL_COL = {
  bestellnummer:   'Bestellnummer',
  bestelldatum:    'Bestelldatum',
  rechnungsnummer: 'Rechnungsnummer',
  rechnungsdatum:  'Rechnungsdatum',
  firma:           'Firma',
  nachname:        'Nachname',
  vorname:         'Vorname',
  lieferschein:    'Lieferschein',
  versanddatum:    'Versanddatum',
  versandart:      'Versandart',
  lieferland:      'Lieferland',
  zahlungsart:     'Zahlungsart',
  kundengruppe:    'Kundengruppe',
  plattformen:     'Plattformen',
  verkaeufer:      'Verkaeufer',
  mwst:            'MwSt',
  gesamtbetrag:    'Gesamtbetrag_Brutto',
};

// ── Statuses ──────────────────────────────────────────────────────────
const DEAL_STATUS = {
  NEW:           'новая',
  OPEN:          'незакрытая',
  AUTO_CLOSED:   'автоматически_закрыта',
  QUARANTINE:    'карантин',
  MANUAL_CHECK:  'ожидает_ручной_проверки',
  MANUAL_OK:     'подтверждена_вручную',
  EXCLUDED:      'исключена_по_платформе',
  DUPLICATE:     'дубль',
  JOINT:         'совместная',
  COUNTED:       'учтена_в_провизионе',
};

// ── Parse JTL CSV ─────────────────────────────────────────────────────
function parseJTLCsv(text) {
  // Detect delimiter: semicolon or comma
  const firstLine = text.split('\n')[0] || '';
  const delim = firstLine.split(';').length > firstLine.split(',').length ? ';' : ',';

  const rows = [];
  const lines = text.split('\n');
  if (!lines.length) return rows;

  // Parse header
  const header = splitCsvLine(lines[0], delim).map(h => h.trim().replace(/^["']|["']$/g,''));

  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const vals = splitCsvLine(line, delim).map(v => v.replace(/^["']|["']$/g,'').trim());
    const obj = {};
    header.forEach((h, idx) => { obj[h] = vals[idx] || ''; });
    rows.push(obj);
  }
  return { header, rows };
}

function splitCsvLine(line, delim) {
  const result = [];
  let current = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQuote = !inQuote; }
    else if (ch === delim && !inQuote) { result.push(current); current = ''; }
    else { current += ch; }
  }
  result.push(current);
  return result;
}

// ── Build dedup key for a JTL row ─────────────────────────────────────
function buildJTLDedupKey(row) {
  const b = (row[JTL_COL.bestellnummer] || '').trim();
  const r = (row[JTL_COL.rechnungsnummer] || '').trim();
  const v = (row[JTL_COL.verkaeufer] || '').trim();
  return `${b}|${r}|${v}`;
}

// ── Classify a single JTL row ─────────────────────────────────────────
function classifyJTLRow(row, excludedPlatforms, dealDedupRegistry) {
  const platform   = (row[JTL_COL.plattformen] || '').trim();
  const mwst       = parseMwSt(row[JTL_COL.mwst] || '');
  const rechnung   = (row[JTL_COL.rechnungsnummer] || '').trim();
  const lieferschein = (row[JTL_COL.lieferschein] || '').trim();
  const versanddatum = (row[JTL_COL.versanddatum] || '').trim();
  const dedupKey   = buildJTLDedupKey(row);

  // 1. Dedup check
  if (dealDedupRegistry.has(dedupKey)) {
    return { status: DEAL_STATUS.DUPLICATE, reason: 'Дубль: уже учтена ранее', dedupKey };
  }

  // 2. Platform exclusion
  if (excludedPlatforms.includes(platform)) {
    return { status: DEAL_STATUS.EXCLUDED, reason: `Платформа исключена: ${platform}`, dedupKey };
  }

  // 3. MwSt = 0 → manual check required
  if (mwst === 0) {
    return { status: DEAL_STATUS.MANUAL_CHECK, reason: 'MwSt = 0 → требует ручной проверки документов', dedupKey };
  }

  // 4. MwSt > 0 — check closing documents
  const hasRechnung    = rechnung !== '';
  const hasDelivery    = lieferschein !== '' || versanddatum !== '';

  if (hasRechnung && hasDelivery) {
    return { status: DEAL_STATUS.AUTO_CLOSED, reason: 'Rechnung + Lieferschein/Versanddatum → авто-закрыта', dedupKey };
  }

  // Quarantine: MwSt > 0 but missing docs
  let missingDocs = [];
  if (!hasRechnung)  missingDocs.push('Rechnungsnummer');
  if (!hasDelivery)  missingDocs.push('Lieferschein / Versanddatum');
  return { status: DEAL_STATUS.QUARANTINE, reason: `Карантин: нет ${missingDocs.join(', ')}`, dedupKey };
}

function parseMwSt(val) {
  if (!val) return 0;
  // Accept "19%", "19,00%", "0", "19.00", etc.
  const cleaned = String(val).replace(/%/g,'').replace(',','.').trim();
  const n = parseFloat(cleaned);
  return isNaN(n) ? 0 : n;
}

// ── Process full JTL file ─────────────────────────────────────────────
function processJTL(csvText, excludedPlatforms, dealDedupRegistry) {
  const parsed = parseJTLCsv(csvText);
  if (!parsed || !parsed.rows) return { deals: [], stats: {}, header: [] };

  const deals = [];
  const stats = {
    total: 0,
    auto_closed: 0,
    quarantine: 0,
    manual_check: 0,
    excluded: 0,
    duplicate: 0,
  };

  // Session dedup within this file
  const sessionKeys = new Set();

  parsed.rows.forEach((row, i) => {
    const bestellnr = (row[JTL_COL.bestellnummer] || '').trim();
    if (!bestellnr) return; // skip empty rows

    const dedupKey = buildJTLDedupKey(row);
    // Session-level dedup (same file)
    const isDupeInSession = sessionKeys.has(dedupKey);
    if (!isDupeInSession) sessionKeys.add(dedupKey);

    const classification = classifyJTLRow(
      row,
      excludedPlatforms,
      isDupeInSession ? new Set([dedupKey, ...dealDedupRegistry]) : dealDedupRegistry
    );

    const mwst = parseMwSt(row[JTL_COL.mwst] || '');
    const deal = {
      id:            `jtl_${i}`,
      bestellnummer: bestellnr,
      rechnungsnummer: (row[JTL_COL.rechnungsnummer] || '').trim(),
      bestelldatum:  (row[JTL_COL.bestelldatum] || '').trim(),
      rechnungsdatum:(row[JTL_COL.rechnungsdatum] || '').trim(),
      firma:         (row[JTL_COL.firma] || '').trim(),
      verkaeufer:    (row[JTL_COL.verkaeufer] || '').trim(),
      lieferland:    (row[JTL_COL.lieferland] || '').trim(),
      plattform:     (row[JTL_COL.plattformen] || '').trim(),
      zahlungsart:   (row[JTL_COL.zahlungsart] || '').trim(),
      lieferschein:  (row[JTL_COL.lieferschein] || '').trim(),
      versanddatum:  (row[JTL_COL.versanddatum] || '').trim(),
      mwst,
      gesamtbetrag:  parseFloat((row[JTL_COL.gesamtbetrag] || '0').replace(',','.')),
      status:        classification.status,
      reason:        classification.reason,
      dedupKey:      classification.dedupKey,
      jointDeal:     null,  // {shares: [{manager, percent}]}
      manualDocs:    {},    // for manual check docs
    };

    deals.push(deal);
    stats.total++;
    if (deal.status === DEAL_STATUS.AUTO_CLOSED)  stats.auto_closed++;
    if (deal.status === DEAL_STATUS.QUARANTINE)   stats.quarantine++;
    if (deal.status === DEAL_STATUS.MANUAL_CHECK) stats.manual_check++;
    if (deal.status === DEAL_STATUS.EXCLUDED)     stats.excluded++;
    if (deal.status === DEAL_STATUS.DUPLICATE)    stats.duplicate++;
  });

  return { deals, stats, header: parsed.header };
}

// ── Joint deal helpers ────────────────────────────────────────────────
function validateJointShares(shares) {
  if (!shares || !shares.length) return { ok: false, msg: 'Нет участников' };
  const total = shares.reduce((x, s) => x + (parseFloat(s.percent) || 0), 0);
  if (Math.abs(total - 100) > 0.01) return { ok: false, msg: `Сумма долей = ${total.toFixed(1)}%, должно быть 100%` };
  return { ok: true, msg: '' };
}

function applyJointDeal(deal, shares) {
  const v = validateJointShares(shares);
  if (!v.ok) return { ok: false, msg: v.msg };
  deal.jointDeal = { shares };
  deal.status = DEAL_STATUS.JOINT;
  return { ok: true, msg: '' };
}

// ── Status label + color ──────────────────────────────────────────────
function statusBadge(status) {
  const map = {
    [DEAL_STATUS.AUTO_CLOSED]:  { cls: 'pill pg',  label: 'авто-закрыта' },
    [DEAL_STATUS.QUARANTINE]:   { cls: 'pill py',  label: 'карантин' },
    [DEAL_STATUS.MANUAL_CHECK]: { cls: 'pill pp',  label: 'ручная проверка' },
    [DEAL_STATUS.MANUAL_OK]:    { cls: 'pill pg',  label: 'подтверждена вручную' },
    [DEAL_STATUS.EXCLUDED]:     { cls: 'pill pgr', label: 'исключена (платформа)' },
    [DEAL_STATUS.DUPLICATE]:    { cls: 'pill pr',  label: 'дубль' },
    [DEAL_STATUS.JOINT]:        { cls: 'pill pb',  label: 'совместная' },
    [DEAL_STATUS.COUNTED]:      { cls: 'pill tg',  label: 'учтена' },
    [DEAL_STATUS.NEW]:          { cls: 'pill pgr', label: 'новая' },
    [DEAL_STATUS.OPEN]:         { cls: 'pill py',  label: 'незакрытая' },
  };
  const d = map[status] || { cls: 'pill pgr', label: status };
  return `<span class="${d.cls}">${d.label}</span>`;
}

// ═══ INIT ═══
document.addEventListener('DOMContentLoaded', () => {
  // Init state
  STATE.managers = loadManagers();
  STATE.dedup    = loadDedupRegistry();
  STATE.history  = loadHistory();
  initProv();
  PROV.deals     = loadDeals();

  // Show pane based on active tab
  function activateTab(tabName) {
    document.querySelectorAll('#mainTabs .tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tabName));
    document.querySelectorAll('#mainPanel .pane').forEach(p => p.classList.toggle('active', p.id === 'pane-' + tabName));
    if (tabName === 'dir')     renderDir();
    if (tabName === 'history') renderHistoryList();
    if (tabName === 'prov')    { renderProvizionTo('provContent'); renderProvSettingsTo('provSettingsContent'); }
  }

  // Tabs
  document.querySelectorAll('#mainTabs .tab').forEach(btn => {
    btn.addEventListener('click', () => activateTab(btn.dataset.tab));
  });

  // File upload drag&drop (onclick/onchange handled inline)
  const uaDrop = document.getElementById('ua');
  if (uaDrop) {
    uaDrop.addEventListener('dragover', e => { e.preventDefault(); uaDrop.classList.add('drag'); });
    uaDrop.addEventListener('dragleave', () => uaDrop.classList.remove('drag'));
    uaDrop.addEventListener('drop', e => { e.preventDefault(); uaDrop.classList.remove('drag'); if (e.dataTransfer.files[0]) loadXLSX(e.dataTransfer.files[0]); });
  }

  // Initial render
  renderDir();
  renderHistoryList();
  renderProvizionTo('provContent');
  renderProvSettingsTo('provSettingsContent');
  renderProvizionTo('provContent2');
  renderProvSettingsTo('provSettingsContent2');
});

function loadXLSX(file) {
  STATE.fileName = file.name;
  document.getElementById('mainPanel').style.display = 'block';
  ['overviewContent','fpc','dedupContent','pvc','stc'].forEach(id => {
    document.getElementById(id).innerHTML = '<div class="loading"><div class="spin"></div>Читаем файл…</div>';
  });
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array', cellDates: false });
      STATE.sheetName = wb.SheetNames[0];
      STATE.raw = XLSX.utils.sheet_to_json(wb.Sheets[STATE.sheetName], { header: 1, defval: null, raw: true });
      STATE.payroll = runPayroll(STATE.raw, STATE.managers, STATE.dedup);
      renderOverview();
      renderFixedTable();
      renderDedupBlock();
      renderPreview();
      renderStructure();
      renderDir();
    } catch(err) {
      document.getElementById('overviewContent').innerHTML = `<div class="eb"><h4>Ошибка чтения файла</h4>${err.message}<br><small>${err.stack||''}</small></div>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function switchProvTab(tab) {
  // Toggle in both locations
  document.querySelectorAll('.sub-tab').forEach(b => {
    if (b.getAttribute('onclick') && b.getAttribute('onclick').includes(tab)) b.classList.add('active');
    else b.classList.remove('active');
  });
  ['provContent','provContent2'].forEach(id => {
    const el = document.getElementById(id); if (el) el.style.display = tab === 'deals' ? '' : 'none';
  });
  ['provSettingsContent','provSettingsContent2'].forEach(id => {
    const el = document.getElementById(id); if (el) el.style.display = tab === 'settings' ? '' : 'none';
  });
  if (tab === 'deals')    { renderProvizionTo('provContent'); renderProvizionTo('provContent2'); }
  if (tab === 'settings') { renderProvSettingsTo('provSettingsContent'); renderProvSettingsTo('provSettingsContent2'); }
}

function savePeriodAction() {
  if (!STATE.payroll) return;
  const { meta, results, errors, fresh, dupes } = STATE.payroll;
  if (!meta.month || !meta.year) { alert('Не удалось определить период.'); return; }
  fresh.forEach(row => STATE.dedup.add(buildDedupKey(row)));
  saveDedupRegistry(STATE.dedup);
  const MONTHS = ['','Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  savePeriod({
    month: meta.month, year: meta.year, savedAt: new Date().toISOString(),
    fileName: STATE.fileName,
    summary: results.map(r => ({ manager:r.manager, base:r.base, fixedSalary:r.fixedSalary, bonus:r.bonus, provizion:r.provizion||0, provBase:r.provBase||0, provRule:r.provRule||'', total:r.total, rule:r.rule, bonusDetail:r.bonusDetail })),
    errors, freshCount: fresh.length, dupeCount: dupes.length,
  });
  STATE.history = loadHistory();
  alert(`Период ${MONTHS[meta.month]} ${meta.year} сохранён.`);
  renderHistoryList();
}

function renderHistoryList() {
  const history = STATE.history;
  const MONTHS = ['','Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const cont = document.getElementById('historyContent');
  if (!cont) return;
  if (!history.length) { cont.innerHTML = `<div style="color:#aaa;font-size:13px;padding:20px 0">Нет сохранённых периодов.</div>`; return; }
  let html = '<div class="history-list">';
  history.forEach(p => {
    const key=`${p.year}-${String(p.month).padStart(2,'0')}`;
    const totFix=p.summary.reduce((x,r)=>x+r.fixedSalary,0);
    const totBonus=p.summary.reduce((x,r)=>x+r.bonus,0);
    const totTotal=p.summary.reduce((x,r)=>x+r.total,0);
    const isOpen=STATE.historyView===key;
    html+=`<div class="hist-card ${isOpen?'hist-open':''}" onclick="viewPeriod('${key}')">
      <div class="hist-head"><strong>${MONTHS[p.month]} ${p.year}</strong>
        <span class="hist-date">${new Date(p.savedAt).toLocaleDateString('ru-RU')}</span>
        <button class="btn btn-danger btn-sm" onclick="deletePeriod(event,'${key}')">✕</button>
      </div>
      <div class="hist-stats">
        <span>Фикс: <strong>${fmt(totFix)} EUR</strong></span>
        <span>Бонус: <strong>${fmt(totBonus)} EUR</strong></span>
        <span>Итого: <strong class="tg">${fmt(totTotal)} EUR</strong></span>
        <span class="hist-meta">${p.summary.length} менеджер(а)</span>
      </div>
    </div>
    ${isOpen?renderPeriodDetail(p):''}`;
  });
  cont.innerHTML = html + '</div>';
}

function rerunPayroll(){if(STATE.raw){STATE.payroll=runPayroll(STATE.raw,STATE.managers,STATE.dedup);renderOverview();renderFixedTable();renderDedupBlock();renderPreview();renderStructure();renderDir();}}
function onModeChange(idx){const isM=document.getElementById(`f_mode_${idx}`).value==='вручную';const tog=(id,dis)=>{const el=document.getElementById(id);if(!el)return;el.style.opacity=dis?'0.4':'1';el.style.pointerEvents=dis?'none':'';el.querySelectorAll('input,select').forEach(x=>x.disabled=dis);};tog(`fg_${idx}`,isM);tog(`fe_${idx}`,isM);tog(`fm_${idx}`,!isM);}
function toggleActive(idx){STATE.managers[idx]['активен']=STATE.managers[idx]['активен']===false;saveManagers(STATE.managers);renderDir();if(STATE.raw)rerunPayroll();}
function addBonusStep(idx){if(!STATE.managers[idx]['бонусы'])STATE.managers[idx]['бонусы']=[];STATE.managers[idx]['бонусы'].push({планка:'',бонус:''});renderDir();}
function delBonusStep(idx,si){STATE.managers[idx]['бонусы'].splice(si,1);saveManagers(STATE.managers);renderDir();if(STATE.raw)rerunPayroll();}
function saveManager(idx){
  const g=id=>document.getElementById(id);
  const name=g(`f_name_${idx}`)?.value?.trim();
  if(!name){alert('Имя не может быть пустым');return;}
  const mode=g(`f_mode_${idx}`)?.value,isM=mode==='вручную';
  if(isM&&isNaN(parseFloat(g(`f_sal_${idx}`)?.value))){alert('Укажите ручной оклад');return;}
  const bonusRows=document.querySelectorAll(`#bonus_${idx} .bonus-step`);
  const bonuses=[];let bonusErr=false;
  bonusRows.forEach(row=>{const pl=row.querySelector('.bp')?.value?.trim(),bn=row.querySelector('.bb')?.value?.trim();
    if(!pl&&!bn)return;if(!pl||isNaN(parseFloat(pl))){alert('Планка бонуса должна быть числом');bonusErr=true;return;}
    if(!bn||isNaN(parseFloat(bn))){alert('Сумма бонуса должна быть числом');bonusErr=true;return;}
    bonuses.push({планка:parseFloat(pl),бонус:parseFloat(bn)});});
  if(bonusErr)return;
  const thrRaw=g(`f_thr_${idx}`)?.value?.trim();
  // Read provizion settings
  const pType   = g(`p_type_${idx}`)?.value || '';
  const pPct    = g(`p_pct_${idx}`)?.value?.trim();
  const pHasThr = g(`p_hasthresh_${idx}`)?.checked || false;
  const pThrVal = g(`p_thresh_${idx}`)?.value?.trim();
  const pLogic  = g(`p_logic_${idx}`)?.value || 'считать только с суммы сверх порога';

  let provSettings = null;
  if (pType) {
    if (!pPct || isNaN(parseFloat(pPct))) { alert('Укажите процент провизиона (число)'); return; }
    if (pHasThr && (!pThrVal || isNaN(parseFloat(pThrVal)))) { alert('Укажите минимум поступлений для порога провизиона'); return; }
    provSettings = {
      тип_ставки: pType,
      процент: parseFloat(pPct),
      есть_порог: pHasThr,
      минимум_поступлений: pHasThr ? parseFloat(pThrVal) : null,
      логика_порога: pHasThr ? pLogic : null,
    };
  }

  STATE.managers[idx]={manager_name:name,активен:STATE.managers[idx]['активен']!==false,режим_фикса:mode,
    группа_фикса:g(`f_group_${idx}`)?.value||'',тип_занятости:g(`f_emp_${idx}`)?.value||'',
    ручной_фиксированный_оклад:isM?parseFloat(g(`f_sal_${idx}`)?.value):null,
    минимальный_порог:isM?(!thrRaw||thrRaw===''?null:parseFloat(thrRaw)):null,
    бонусы:bonuses,
    настройки_провизиона: provSettings};
  saveManagers(STATE.managers);renderDir();if(STATE.raw)rerunPayroll();
}
function addManager(){STATE.managers.push({manager_name:'',активен:true,режим_фикса:'по группе',группа_фикса:'удалённый менеджер',тип_занятости:'полная занятость',бонусы:[]});renderDir();}
function deleteManager(idx){if(!confirm(`Удалить "${STATE.managers[idx].manager_name}"?`))return;STATE.managers.splice(idx,1);saveManagers(STATE.managers);renderDir();if(STATE.raw)rerunPayroll();}

function renderDealActionsHTML(deal, idx, contId) {
  const btns=[];
  if(deal.status===DEAL_STATUS.AUTO_CLOSED||deal.status===DEAL_STATUS.MANUAL_OK)
    btns.push(`<button class="btn btn-secondary btn-sm" onclick="openJoint(${idx},'${contId}')">👥 Совместная</button>`);
  if(deal.status===DEAL_STATUS.MANUAL_CHECK)
    btns.push(`<button class="btn btn-primary btn-sm" onclick="markOK(${idx})">✓ Подтвердить</button>`);
  if(deal.status===DEAL_STATUS.JOINT)
    btns.push(`<button class="btn btn-secondary btn-sm" onclick="openJoint(${idx},'${contId}')">✏️ Доли</button>`);
  return btns.join(' ');
}

function togglePlatform(p,ex){const s=PROV.settings;if(ex){if(!s.excludedPlatforms.includes(p))s.excludedPlatforms.push(p);}else{s.excludedPlatforms=s.excludedPlatforms.filter(x=>x!==p);}saveProvSettings(s);renderProvSettingsTo('provSettingsContent');renderProvSettingsTo('provSettingsContent2');}
function addPlatform(cid){const input=document.getElementById(`newPlat_${cid}`);const val=input?.value?.trim();if(!val)return;const s=PROV.settings;if(!s.allPlatforms)s.allPlatforms=[];if(!s.allPlatforms.includes(val))s.allPlatforms.push(val);saveProvSettings(s);input.value='';renderProvSettingsTo('provSettingsContent');renderProvSettingsTo('provSettingsContent2');}
function setProvFilter(f){PROV.filter=f;renderProvizionTo('provContent');renderProvizionTo('provContent2');}
function loadJTLFromInput(input){if(!input.files[0])return;const reader=new FileReader();reader.onload=e=>{const result=processJTL(e.target.result,PROV.settings.excludedPlatforms,PROV.dealDedup);PROV.deals=result.deals;saveDeals(PROV.deals);renderProvizionTo('provContent');renderProvizionTo('provContent2');};reader.readAsText(input.files[0],'UTF-8');}

function registerCountedDeals(){
  const cl=PROV.deals.filter(d=>d.status===DEAL_STATUS.AUTO_CLOSED||d.status===DEAL_STATUS.MANUAL_OK||d.status===DEAL_STATUS.JOINT);
  if(!cl.length){alert('Нет закрытых сделок.');return;}
  cl.forEach(d=>{PROV.dealDedup.add(d.dedupKey);d.status=DEAL_STATUS.COUNTED;d.reason='Учтена в провизионе';});
  saveDealDedup(PROV.dealDedup);saveDeals(PROV.deals);alert(`Зарегистрировано ${cl.length} сделок.`);
  renderProvizionTo('provContent');renderProvizionTo('provContent2');
}

  const rows=table.querySelectorAll('tr');
  let target=null;
  rows.forEach(r=>{if(r.cells[0]?.textContent?.trim()===deal.bestellnummer)target=r;});
  if(target)target.insertAdjacentElement('afterend',newRow);
  else table.appendChild(newRow);
}
function addJShare(idx,contId){const c=document.getElementById(`jshares-${idx}-${contId}`);if(!c)return;const d=document.createElement('div');d.className='bonus-step';d.innerHTML=`<input type="text" class="js-m" placeholder="Менеджер"><input type="number" class="js-p" placeholder="%"><button class="bonus-del" onclick="this.parentElement.remove()">✕</button>`;c.appendChild(d);}
function saveJoint(idx,contId){
  const c=document.getElementById(`jshares-${idx}-${contId}`);if(!c)return;
  const shares=[];c.querySelectorAll('.bonus-step').forEach(row=>{const m=row.querySelector('.js-m')?.value?.trim(),p=parseFloat(row.querySelector('.js-p')?.value);if(m&&!isNaN(p))shares.push({manager:m,percent:p});});
  const v=validateJointShares(shares);
  if(!v.ok){const e=document.getElementById(`jerr-${idx}-${contId}`);if(e)e.textContent=v.msg;return;}
  applyJointDeal(PROV.deals[idx],shares);saveDeals(PROV.deals);
  document.getElementById(`jd-${idx}-${contId}`)?.remove();
  renderProvizionTo('provContent');renderProvizionTo('provContent2');
}


function toggleProvThresh(idx) {
  const checked = document.getElementById(`p_hasthresh_${idx}`)?.checked;
  const tr  = document.getElementById(`p_thresh_row_${idx}`);
  const lr  = document.getElementById(`p_logic_row_${idx}`);
  const ti  = document.getElementById(`p_thresh_${idx}`);
  const li  = document.getElementById(`p_logic_${idx}`);
  if (tr) { tr.style.opacity = checked ? '1' : '0.4'; tr.style.pointerEvents = checked ? '' : 'none'; }
  if (lr) { lr.style.opacity = checked ? '1' : '0.4'; lr.style.pointerEvents = checked ? '' : 'none'; }
  if (ti) ti.disabled = !checked;
  if (li) li.disabled = !checked;
}

// Pill helpers
const mpill=m=>m==='по группе'?`<span class="pill pb">${m}</span>`:m==='вручную'?`<span class="pill pp">${m}</span>`:`<span class="pill pgr">${m||'—'}</span>`;
const gpill=g=>g==='удалённый менеджер'?`<span class="pill py">${g}</span>`:g==='фикс независимо от поступлений'?`<span class="pill pg">${g}</span>`:g==='без оклада'?`<span class="pill pgr">${g}</span>`:`<span class="pill pgr">${g||'—'}</span>`;
const epill=e=>e==='полная занятость'?`<span class="pill pb">${e}</span>`:e==='частичная занятость'?`<span class="pill pgr">${e}</span>`:`<span class="pill pgr">${e||'—'}</span>`;
const eh=v=>String(v||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
