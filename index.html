<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sales Payroll MVP v0.8</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;font-size:14px}
.app{max-width:1260px;margin:0 auto;padding:20px 16px}
h1{font-size:20px;font-weight:700}
.sub{font-size:12px;color:#666;margin-top:3px;margin-bottom:18px}
.ua{background:#fff;border:2px dashed #c0cae0;border-radius:12px;padding:32px 24px;text-align:center;margin-bottom:16px;cursor:pointer;transition:border-color .2s}
.ua:hover{border-color:#4f7fff}
.ua .ico{font-size:28px;margin-bottom:8px}
.ua p{font-size:13px;color:#555;margin-bottom:4px}
.ua .hint{font-size:11px;color:#aaa;margin-bottom:12px}
.bup{display:inline-block;background:#4f7fff;color:#fff;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}
.panel{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:14px}
.tabs{display:flex;border-bottom:2px solid #eee;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:8px 14px;border:none;background:none;cursor:pointer;font-size:12px;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;font-weight:500}
.tab:hover{color:#4f7fff}.tab.active{color:#4f7fff;border-bottom-color:#4f7fff}
.pane{display:none}.pane.active{display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.card{background:#f7f9ff;border-radius:10px;padding:12px 14px;border:1px solid #e8ecf8}
.card.g{border-color:#a8e6b8;background:#f0fff4}.card.b{border-color:#93c5fd;background:#eff6ff}
.card.r{border-color:#ffb8b8;background:#fff4f4}.card.y{border-color:#fcd34d;background:#fffbeb}
.card.v{border-color:#c4b5fd;background:#faf5ff}
.clbl{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.cval{font-size:19px;font-weight:700}.csm{font-size:15px}
.card.g .cval{color:#1a7a3a}.card.b .cval{color:#1e40af}
.card.r .cval{color:#c0392b}.card.y .cval{color:#92400e}.card.v .cval{color:#6d28d9}
.csub{font-size:10px;color:#aaa;margin-top:2px}
.mbx{background:#f7f9ff;border-radius:8px;padding:12px 14px;font-size:12px;border:1px solid #e8ecf8;margin-bottom:12px}
.mrow{display:flex;gap:10px;margin-bottom:4px}
.mk{color:#888;min-width:130px;flex-shrink:0}.mv{font-weight:500}
.ok-box{background:#f0fff4;border:1px solid #a8e6b8;border-radius:8px;padding:12px 14px;font-size:12px;color:#1a7a3a;margin-bottom:10px}
.wb{background:#fffbe6;border:1px solid #fcd34d;border-radius:8px;padding:12px 14px;font-size:12px;color:#7a5c00;margin-bottom:10px}
.eb{background:#fff4f4;border:1px solid #ffb0b0;border-radius:8px;padding:11px 14px;margin-bottom:10px;font-size:12px;color:#c0392b}
.eb h4{margin-bottom:6px;font-size:13px;font-weight:600}
.vb{background:#faf5ff;border:1px solid #c4b5fd;border-radius:8px;padding:11px 14px;margin-bottom:10px;font-size:12px;color:#6d28d9}
.vb h4{margin-bottom:6px;font-size:13px;font-weight:600}
.sh{font-size:13px;font-weight:600;color:#333;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid #eee}
.tw{overflow-x:auto;border-radius:8px;border:1px solid #eee;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#f7f9ff;padding:8px 10px;text-align:left;font-weight:600;color:#555;border-bottom:2px solid #eee;white-space:nowrap}
tbody td{padding:7px 10px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f9fbff}
.trow{background:#f0fff4;font-weight:600}
.tlbl{text-align:right;padding-right:14px;color:#666;font-size:11px}
.rcol{color:#666;font-size:11px;max-width:220px;white-space:normal}
.bdet{color:#1e40af;font-size:10px}.pdet{color:#6d28d9;font-size:10px}
.pill{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;white-space:nowrap}
.py{background:#fff3cd;color:#856404}.pg{background:#d1f7e0;color:#1a7a3a}
.pgr{background:#f0f0f0;color:#666}.pb{background:#dbeafe;color:#1e40af}
.pp{background:#ede9fe;color:#6d28d9}.pr{background:#fee2e2;color:#b91c1c}
.fs{background:linear-gradient(135deg,#f0fff4,#e8f4fd);border:1px solid #a8d8b8;border-radius:10px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.fsv{font-size:22px;font-weight:700;color:#1a7a3a}.fsl{font-size:11px;color:#4a9a6a;margin-bottom:2px}.fsi{font-size:12px;color:#666}
.spin{width:24px;height:24px;border:3px solid #eee;border-top-color:#4f7fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 8px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:26px;color:#888;font-size:12px}
.mono{font-family:monospace;font-size:11px}
.tg{color:#1a7a3a;font-weight:600}.tm{color:#aaa}.tb{color:#1e40af;font-weight:600}.tv{color:#6d28d9;font-weight:600}.fw{font-weight:700}
.btn{padding:6px 13px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;border:1.5px solid;background:#fff}
.btn-p{background:#4f7fff;color:#fff;border-color:#4f7fff}.btn-p:hover{background:#3a6aee}
.btn-s{color:#444;border-color:#d0d4e0}.btn-s:hover{background:#f5f6fa}
.btn-d{color:#c0392b;border-color:#ffb0b0}.btn-d:hover{background:#fff4f4}
.btn-ok{background:#1a7a3a;color:#fff;border-color:#1a7a3a}.btn-ok:hover{background:#145c2c}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:5px}
.dtb{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.dtb h2{font-size:13px;font-weight:600;flex:1}
.mcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:11px}
.mc{background:#f9fafb;border:1.5px solid #e0e4ec;border-radius:10px;padding:13px 14px;position:relative}
.mc:hover{border-color:#b0bce0}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
.frow.full{grid-template-columns:1fr}
.fld label{display:block;font-size:10px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.fld input,.fld select{width:100%;border:1px solid #d0d4e0;border-radius:6px;padding:5px 8px;font-size:12px;background:#fff;color:#1a1a2e;outline:none}
.fld input:focus,.fld select:focus{border-color:#4f7fff}
.fld input:disabled,.fld select:disabled{background:#f5f5f5;color:#bbb;cursor:not-allowed}
.cact{display:flex;gap:6px;margin-top:9px;justify-content:flex-end;border-top:1px solid #eee;padding-top:9px}
.trow2{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:8px 12px;border-radius:8px}
.trow2.on{background:#f0fff4;border:1px solid #a8e6b8}.trow2.off{background:#fff4f4;border:1px solid #ffb0b0}
.tlbl2{font-size:12px;font-weight:600;flex:1}
.tlbl2.on{color:#1a7a3a}.tlbl2.off{color:#c0392b}
.tbtn{position:relative;width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;flex-shrink:0;transition:background .2s}
.tbtn.on{background:#34c759}.tbtn.off{background:#ccc}
.tbtn::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;transition:left .2s}
.tbtn.on::after{left:23px}.tbtn.off::after{left:3px}
.bsec{margin-top:10px;padding-top:10px;border-top:1px dashed #ddd}
.bsec h5{font-size:10px;font-weight:700;color:#1e40af;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.bstep{display:grid;grid-template-columns:1fr 1fr auto;gap:6px;margin-bottom:6px;align-items:center}
.bstep input{border:1px solid #d0d4e0;border-radius:6px;padding:5px 8px;font-size:12px;background:#fff;width:100%;outline:none}
.bstep input:focus{border-color:#1e40af}
.bdel{background:none;border:none;cursor:pointer;color:#c0392b;font-size:14px;padding:2px 4px}
.badd{font-size:11px;color:#1e40af;background:none;border:1px solid #bfdbfe;border-radius:5px;padding:4px 10px;cursor:pointer}
.badd:hover{background:#eff6ff}
.psec{margin-top:10px;padding:10px 12px;border:1px dashed #c4b5fd;border-radius:8px;background:#faf5ff}
.psec h5{font-size:10px;font-weight:700;color:#6d28d9;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.hlist{display:flex;flex-direction:column;gap:10px}
.hcard{background:#f7f9ff;border:1.5px solid #e0e4ec;border-radius:10px;padding:14px 16px;cursor:pointer}
.hcard:hover{border-color:#4f7fff}.hcard.open{border-color:#4f7fff;background:#f0f4ff}
.hhead{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.hhead strong{font-size:14px}.hdate{font-size:11px;color:#aaa;flex:1}
.hstats{display:flex;gap:16px;font-size:12px;flex-wrap:wrap}.hmeta{color:#aaa;font-size:11px}
.pdet2{background:#fff;border:1px solid #e0e4ec;border-radius:10px;padding:16px;margin-top:8px}

/* Manual confirmation dialog */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:14px;padding:24px;max-width:520px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.18);max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:6px}
.modal .sub{font-size:12px;color:#888;margin-bottom:18px}
.doc-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.doc-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border:1.5px solid #e0e4ec;border-radius:10px;cursor:pointer;transition:all .15s}
.doc-item:hover{border-color:#4f7fff;background:#f7f9ff}
.doc-item.checked{border-color:#34c759;background:#f0fff4}
.doc-item input[type=checkbox]{width:18px;height:18px;margin-top:1px;flex-shrink:0;accent-color:#34c759}
.doc-item-text strong{display:block;font-size:13px;margin-bottom:2px}
.doc-item-text span{font-size:11px;color:#888}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;border-top:1px solid #eee;padding-top:16px}
.modal-note{font-size:11px;color:#888;margin-bottom:16px;padding:10px 12px;background:#fffbe6;border-radius:8px;border:1px solid #ffe066}

.stabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.stab{padding:5px 12px;border:1.5px solid #d0d4e0;border-radius:6px;cursor:pointer;font-size:11px;font-weight:500;color:#666;background:#fff}
.stab:hover{border-color:#4f7fff;color:#4f7fff}.stab.active{background:#4f7fff;border-color:#4f7fff;color:#fff}

/* Period selector */
.period-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 16px;background:#f7f9ff;border-radius:10px;border:1px solid #e8ecf8;margin-bottom:14px}
.period-bar label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em}
.period-bar select,.period-bar input{border:1px solid #d0d4e0;border-radius:6px;padding:5px 10px;font-size:13px;background:#fff;outline:none}
.period-bar select:focus{border-color:#4f7fff}
.status-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.sp-draft{background:#fffbe6;color:#856404;border:1px solid #fcd34d}
.sp-saved{background:#f0fff4;color:#1a7a3a;border:1px solid #a8e6b8}
.sp-approved{background:#eff6ff;color:#1e40af;border:1px solid #93c5fd}
/* History detail tabs */
.dtabs{display:flex;gap:4px;flex-wrap:wrap;margin:12px 0 10px}
.dtab{padding:4px 12px;border:1.5px solid #d0d4e0;border-radius:6px;cursor:pointer;font-size:11px;font-weight:500;color:#666;background:#fff}
.dtab:hover{border-color:#4f7fff;color:#4f7fff}.dtab.act{background:#4f7fff;border-color:#4f7fff;color:#fff}
/* Deal registry rows */
.period-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;background:#e0e7ff;color:#3730a3;font-weight:500}

/* Payroll statement */
.ved-header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;border-radius:12px;padding:20px 24px;margin-bottom:16px}
.ved-header h2{font-size:18px;font-weight:700;margin-bottom:4px}
.ved-header .sub{font-size:12px;color:#94a3b8;margin-bottom:14px}
.ved-totals{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-top:14px}
.ved-tot{background:rgba(255,255,255,.08);border-radius:8px;padding:10px 14px}
.ved-tot .lbl{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.ved-tot .val{font-size:18px;font-weight:700;color:#fff}
.ved-tot .val.g{color:#4ade80}.ved-tot .val.b{color:#60a5fa}.ved-tot .val.v{color:#c084fc}
.warn-val{color:#f59e0b !important}

/* Manager rows */
.mgr-row{border:1.5px solid #e0e4ec;border-radius:10px;margin-bottom:8px;overflow:hidden}
.mgr-row-head{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;background:#fff;transition:background .15s}
.mgr-row-head:hover{background:#f7f9ff}
.mgr-row-head.open{background:#f0f4ff;border-bottom:1px solid #e0e4ec}
.mgr-avatar{width:36px;height:36px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#1e40af;flex-shrink:0}
.mgr-name{font-weight:600;font-size:13px;flex:1}
.mgr-amounts{display:flex;gap:16px;align-items:center}
.mgr-amt{text-align:right}
.mgr-amt .lbl{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.04em}
.mgr-amt .val{font-size:13px;font-weight:600}
.mgr-amt .val.fix{color:#1a7a3a}.mgr-amt .val.bon{color:#1e40af}
.mgr-amt .val.prv{color:#6d28d9}.mgr-amt .val.tot{color:#1a1a2e;font-size:15px}
.mgr-chevron{font-size:12px;color:#aaa;flex-shrink:0;transition:transform .2s}
.mgr-chevron.open{transform:rotate(90deg)}
/* Detail panels */
.mgr-detail{padding:16px;background:#fafbfc;border-top:1px solid #eee;display:none}
.mgr-detail.open{display:block}
.det-section{margin-bottom:14px;padding-bottom:14px;border-bottom:1px dashed #eee}
.det-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.det-section h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.det-row{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;font-size:12px}
.det-row .lbl{color:#666;flex:1}
.det-row .val{font-weight:600;text-align:right;min-width:80px}
.det-row .val.ok{color:#1a7a3a}.det-row .val.hi{color:#1e40af}.det-row .val.pv{color:#6d28d9}
.det-row .val.nm{color:#aaa}
.bonus-reached{background:#f0fff4;border:1px solid #a8d8b8;border-radius:6px;padding:4px 10px;font-size:11px;color:#1a7a3a;display:inline-block;margin:2px}
.bonus-missed{background:#f5f5f5;border:1px solid #e0e0e0;border-radius:6px;padding:4px 10px;font-size:11px;color:#aaa;display:inline-block;margin:2px;text-decoration:line-through}
.deal-chip{display:inline-flex;gap:8px;align-items:center;background:#f0f4ff;border:1px solid #bfdbfe;border-radius:6px;padding:4px 10px;margin:2px;font-size:11px}
.deal-chip.joint{background:#fdf4ff;border-color:#e9d5ff}
.deal-chip.dup{background:#fff4f4;border-color:#fecaca;color:#b91c1c}
/* Filter bar */
.ved-filter{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.ved-filter select,.ved-filter input{border:1px solid #d0d4e0;border-radius:6px;padding:6px 10px;font-size:13px;outline:none}
.ved-filter select:focus,.ved-filter input:focus{border-color:#4f7fff}

</style>
</head>
<body>
<div class="app">
  <header>
    <h1>💰 Sales Payroll MVP</h1>
    <p class="sub">v0.8 · Фикс + Бонус + Провизион + Дедупликация + История · Frontend only · GitHub Pages</p>
  </header>

  <!-- XLSX Upload -->
  <div class="ua" id="ua" onclick="document.getElementById('fi').click()">
    <div class="ico">📂</div>
    <p>Загрузите Excel-файл отчёта по поступлениям</p>
    <p class="hint">.xlsx — выгрузка из ERP/1С</p>
    <input type="file" id="fi" accept=".xlsx,.xls" style="display:none"
           onchange="if(this.files[0])handleXLSX(this.files[0])">
    <span class="bup" onclick="event.stopPropagation();document.getElementById('fi').click()">Выбрать файл</span>
  </div>

  <!-- Main tabs panel -->
  <div class="panel">
    <div class="tabs">
      <button class="tab active" onclick="goTab('ov')">Обзор</button>
      <button class="tab" onclick="goTab('fp')">🧮 Реестр выплат</button>
      <button class="tab" onclick="goTab('prov')">📦 Провизион</button>
      <button class="tab" onclick="goTab('ded')">🔍 Дубли оплат</button>
      <button class="tab" onclick="goTab('hist')">📅 История</button>
      <button class="tab" onclick="goTab('mgr')">⚙️ Менеджеры</button>
      <button class="tab" onclick="goTab('prev')">Предпросмотр</button>
      <button class="tab" onclick="goTab('ved')">📋 Ведомость</button>
      <button class="tab" onclick="goTab('str')">Структура</button>
    </div>

    <div class="pane active" id="pane-ov"><div id="ov"></div></div>
    <div class="pane" id="pane-fp"><div id="fp"></div></div>
    <div class="pane" id="pane-prov">
      <div class="stabs">
        <button class="stab active" onclick="goStab('prov-deals')">Реестр сделок JTL</button>
        <button class="stab" onclick="goStab('prov-plat')">Настройки платформ</button>
      </div>
      <div id="prov-deals"></div>
      <div id="prov-plat" style="display:none"></div>
    </div>
    <div class="pane" id="pane-ded"><div id="ded"></div></div>
    <div class="pane" id="pane-hist"><div id="hist"></div></div>
    <div class="pane" id="pane-mgr"><div id="mgr"></div></div>
    <div class="pane" id="pane-prev"><div id="prev"></div></div>
    <div class="pane" id="pane-ved"><div id="ved"></div></div>
    <div class="pane" id="pane-str"><div id="str"></div></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
'use strict';

const MONTHS = ['','Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const COL = { date:0,counterpart:3,manager:4,article:7,name:8,qty:12,received:14,goodsNoVat:15,serviceNoVat:16 };

const DEFAULT_MANAGERS = [
  { manager_name:'David K.', активен:true, режим_фикса:'по группе', группа_фикса:'удалённый менеджер', тип_занятости:'полная занятость',
    бонусы:[{планка:35000,бонус:200},{планка:40000,бонус:300}],
    настройки_провизиона:{тип_ставки:'фиксированный процент',процент:4,есть_порог:true,минимум_поступлений:25000,логика_порога:'считать только с суммы сверх порога'} },

function lsGet(k,def) { try { const v=localStorage.getItem(k); return v?JSON.parse(v):def; } catch(e){ return def; } }
function lsSet(k,v) { try { localStorage.setItem(k,JSON.stringify(v)); } catch(e){} }

function loadMgr() {
  const saved = lsGet(LS.mgr, null);
  if (!saved) return JSON.parse(JSON.stringify(DEFAULT_MANAGERS));
  // Migrate: copy verkaeufer_name from defaults if missing
  // Also: if default verkaeufer_name matches saved manager_name, update manager_name
  let changed = false;
  saved.forEach(m => {
    const mName = (m.manager_name||'').trim();
    if (!m.verkaeufer_name) {
      // Try exact match on manager_name
      let def = DEFAULT_MANAGERS.find(d => d.manager_name.trim() === mName);
      // Try: saved manager_name is a prefix of default verkaeufer_name (e.g. 'Volodymyr' in 'Volodymyr Rozenblit')
      if (!def) def = DEFAULT_MANAGERS.find(d =>
        d.verkaeufer_name && d.verkaeufer_name.toLowerCase().startsWith(mName.toLowerCase() + ' ')
      );
      if (def && def.verkaeufer_name) {
        m.verkaeufer_name = def.verkaeufer_name;
        changed = true;
      }
    }
  });
  if (changed) lsSet(LS.mgr, saved);
  return saved;
}

function excelDate(n) {
  const d=new Date(Math.round((n-25569)*86400*1000));
  return String(d.getUTCDate()).padStart(2,'0')+'.'+String(d.getUTCMonth()+1).padStart(2,'0')+'.'+d.getUTCFullYear();
}
function sv(v) { if(v==null)return''; if(typeof v==='number'&&v>40000&&v<70000)return excelDate(v); return String(v).trim(); }
function nv(v) { if(v==null||v==='')return 0; const x=parseFloat(String(v).replace(',','.')); return isNaN(x)?0:x; }
function fmt(v) { if(!v&&v!==0)return'—'; if(v===0)return'0,00'; return v.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function eh(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function ini(name) { return (name||'').split(/\s+/).map(w=>w[0]||'').join('').toUpperCase().substring(0,2)||'?'; }

function mpill(m){ return m==='по группе'?`<span class="pill pb">${m}</span>`:m==='вручную'?`<span class="pill pp">${m}</span>`:`<span class="pill pgr">${m||'—'}</span>`; }

// ROW CLASSIFICATION
// ═══════════════════════════════════════════════════════════
function classify(row) {
  const f=sv(row[0]), nn=row.filter(v=>v!=null&&v!=='').length;
  if(nn===0) return 'empty';
  if(f.includes('Data parameters')||f.includes('Дата начала')||f.includes('Дата окончания')||f.includes('Filter:')) return 'service';
  if(f==='Фонд'||f==='Документ'||f==='Дата') return 'header';
  if(row.some(v=>sv(v)==='Документ основание')) return 'header';
  if(f==='Total'||f==='Итого') return 'total';
  if(/^0\d\s+фонд\s+/i.test(f)) return 'group';
  if(/Поступление на расчетный счет\s+\d+/i.test(f)) return 'doc_bank';
  if(/ПКО\s+[A-Z]+\d+/i.test(f)) return 'doc_cash';
  if(/^\d{2}\.\d{2}\.\d{4}/.test(f)) return 'data';
  return 'unknown';
}

function extractMeta(raw) {
  const m={};
  raw.slice(0,10).forEach(row=>{
    const r=row.map(sv).join(' ');
    const a=r.match(/Дата начала[:\s]+(\d{2}\.\d{2}\.\d{4})/);
    const b=r.match(/Дата окончания[:\s]+(\d{2}\.\d{2}\.\d{4})/);
    if(a)m.start=a[1]; if(b)m.end=b[1];
    if(r.includes('фонд GH'))m.fund='01 фонд GH';
  });
  if(m.start){const p=m.start.split('.');m.month=+p[1];m.year=+p[2];}
  return m;
}

function buildRows(raw) {
  const rows=[]; let fund='',doc='',docType='';
  raw.forEach(row=>{
    const t=classify(row);
    if(t==='group') fund=sv(row[0]);
    if(t==='doc_bank'){doc=sv(row[0]);docType='bank';}
    if(t==='doc_cash'){doc=sv(row[0]);docType='cash';}
    if(t==='data'){
      const art=sv(row[COL.article]),svc=nv(row[COL.serviceNoVat]),gds=nv(row[COL.goodsNoVat]);
      rows.push({fund,document:doc,docType,date:sv(row[COL.date]),counterpart:sv(row[COL.counterpart]),
        manager:sv(row[COL.manager]),article:art,name:sv(row[COL.name]),qty:nv(row[COL.qty]),
        received:nv(row[COL.received]),goodsNoVat:gds,serviceNoVat:svc,
        isService:art.includes('EUPL')||(svc>0&&gds===0)});
    }
  });
  return rows;
}

function dedupRows(rows,registry) {
  const fresh=[],dupes=[],seen=new Set();
  rows.forEach(r=>{
    const k=[sv(r.date).substring(0,10),r.manager,r.counterpart,r.document,Math.round((r.received||0)*100),Math.round((r.goodsNoVat||0)*100)].join('|');
    r._dk=k;
    if(registry.has(k)||seen.has(k)){dupes.push(r);}else{seen.add(k);fresh.push(r);}
  });
  return{fresh,dupes};
}

function aggByMgr(rows) {
  const m={};
  rows.forEach(r=>{
    const k=r.manager||'(не указан)';
    if(!m[k])m[k]={name:k,rows:[],totalReceived:0,goodsSum:0,docs:new Set()};
    m[k].rows.push(r);m[k].totalReceived+=r.received||0;m[k].goodsSum+=r.goodsNoVat||0;
    if(r.document)m[k].docs.add(r.document);
  });
  return Object.values(m).sort((a,b)=>b.totalReceived-a.totalReceived);
}

// SALARY CALCULATIONS
// ═══════════════════════════════════════════════════════════
function calcFixed(e,base) {
  const mode=e['режим_фикса'];
  if(!mode)return{fixed:0,rule:'Не указан режим_фикса',err:true};
  if(mode==='вручную'){
    const sal=e['ручной_фиксированный_оклад'];
    if(sal==null||sal==='')return{fixed:0,rule:'вручную: не указан оклад',err:true};
    const sn=parseFloat(sal);if(isNaN(sn))return{fixed:0,rule:'вручную: оклад не число',err:true};
    const thr=e['минимальный_порог'],hasThr=thr!=null&&thr!==''&&thr!=='нет';
    if(hasThr){const tn=parseFloat(thr);if(isNaN(tn))return{fixed:0,rule:'вручную: порог не число',err:true};
      return base>=tn?{fixed:sn,rule:`вручную: ${sn}, порог ${fmt(tn)} → выплачено`,err:false}:{fixed:0,rule:`вручную: ${sn}, порог ${fmt(tn)} → не достигнут (${fmt(base)})`,err:false};}
    return{fixed:sn,rule:`вручную: ${sn}, порог нет → выплачено`,err:false};
  }
  if(mode==='по группе'){
    const g=e['группа_фикса'],et=e['тип_занятости'];
    if(!g)return{fixed:0,rule:'по группе: не указана группа_фикса',err:true};
    if(!et&&g!=='без оклада')return{fixed:0,rule:'по группе: не указан тип_занятости',err:true};
    if(g==='без оклада')return{fixed:0,rule:'без оклада → 0',err:false};
    if(g==='фикс независимо от поступлений'){
      if(et==='полная занятость')return{fixed:800,rule:'фикс всегда, полная занятость → 800',err:false};
      if(et==='частичная занятость')return{fixed:400,rule:'фикс всегда, частичная занятость → 400',err:false};
      return{fixed:0,rule:`неизвестный тип: "${et}"`,err:true};
    }
    if(g==='удалённый менеджер'){
      if(et==='полная занятость')return base>=10000?{fixed:800,rule:'полная занятость ≥ 10 000 → 800',err:false}:{fixed:400,rule:`полная занятость < 10 000 → 400 (база: ${fmt(base)})`,err:false};
      if(et==='частичная занятость')return base>=5000?{fixed:400,rule:'частичная занятость ≥ 5 000 → 400',err:false}:{fixed:200,rule:`частичная занятость < 5 000 → 200 (база: ${fmt(base)})`,err:false};
      return{fixed:0,rule:`неизвестный тип: "${et}"`,err:true};
    }
    return{fixed:0,rule:`неизвестная группа: "${g}"`,err:true};
  }
  return{fixed:0,rule:`неизвестный режим: "${mode}"`,err:true};
}

function calcBonus(e,base) {
  const steps=e['бонусы'];
  if(!steps||!steps.length)return{bonus:0,detail:'',err:false};
  let total=0;const reached=[];
  steps.forEach((st,i)=>{
    const pl=parseFloat(st['планка']),bn=parseFloat(st['бонус']);
    if(!isNaN(pl)&&!isNaN(bn)&&base>=pl){total+=bn;reached.push(`${fmt(pl)} → +${fmt(bn)}`);}
  });
  return{bonus:total,detail:reached.join('; '),err:false};
}

function calcProv(e,provBase,receipts) {
  const ps=e['настройки_провизиона'];
  if(!ps)return{prov:0,rule:'провизион не настроен',err:true};
  const type=ps['тип_ставки'];
  if(!type)return{prov:0,rule:'не указан тип_ставки провизиона',err:true};

  // Threshold check (applies to all types)
  const hasThr=ps['есть_порог']===true;
  let effectiveBase=provBase,threshNote='';
  if(hasThr){
    const minR=parseFloat(ps['минимум_поступлений']);
    if(isNaN(minR)||minR<0)return{prov:0,rule:'есть_порог=true, но минимум_поступлений некорректен',err:true};
    if(receipts>=minR){threshNote=`порог ${fmt(minR)} EUR достигнут → `;}
    else{
      const logic=ps['логика_порога']||'считать только с суммы сверх порога';
      if(logic==='считать только с суммы сверх порога'){effectiveBase=Math.max(0,provBase-minR);threshNote=`порог не достигнут, только сверх ${fmt(minR)} (${fmt(effectiveBase)}) → `;}
      else{threshNote=`порог не достигнут, со всей базы → `;}
    }
  }

  // Ступенчатая шкала
  if(type==='ступенчатая шкала'){
    const steps=ps['ступени'];
    if(!steps||!steps.length)return{prov:0,rule:'ступенчатая шкала: нет ступеней',err:true};
    const vErr=validateStepsCalc(steps);
    if(vErr)return{prov:0,rule:'ступенчатая шкала: '+vErr,err:true};
    let total=0,details=[];
    steps.forEach(st=>{
      const from=parseFloat(st.от)||0;
      const to=st.до!=null&&st.до!==''?parseFloat(st.до):Infinity;
      const pct=parseFloat(st.процент);
      if(isNaN(pct))return;
      // How much of effectiveBase falls in [from, to)
      const low=Math.min(Math.max(effectiveBase,from),to);
      const high=Math.min(effectiveBase,to);
      const slice=Math.max(0,high-from);
      if(slice>0){
        const contribution=Math.round(slice*pct/100*100)/100;
        total+=contribution;
        details.push(`${fmt(from)}–${to===Infinity?'∞':fmt(to)}: ${pct}% × ${fmt(slice)} = ${fmt(contribution)}`);
      }
    });
    total=Math.round(total*100)/100;
    return{prov:total,rule:`${threshNote}ступенчатая шкала: ${details.join(' | ')} = ${fmt(total)} EUR`,err:false};
  }

  // Fixed / individual %
  const pct=parseFloat(ps['процент']);
  if(isNaN(pct)||pct<0)return{prov:0,rule:'процент провизиона не задан или некорректен',err:true};
  const amount=Math.round(effectiveBase*pct/100*100)/100;
  const label=type==='фиксированный процент'?`фикс. ${pct}%`:`инд. ${pct}%`;
  return{prov:amount,rule:`${threshNote}${label} от ${fmt(effectiveBase)} = ${fmt(amount)} EUR`,err:false};
}

function validateStepsCalc(steps) {
  for(let i=0;i<steps.length;i++){
    const st=steps[i];
    if(st.от==null||isNaN(parseFloat(st.от)))return`ступень ${i+1}: "от" должна быть числом`;
    if(st.до!=null&&st.до!==''&&isNaN(parseFloat(st.до)))return`ступень ${i+1}: "до" должна быть числом`;
    if(isNaN(parseFloat(st.процент)))return`ступень ${i+1}: процент должен быть числом`;
    if(i<steps.length-1&&(st.до==null||st.до===''))return`ступень ${i+1}: "до" может быть пустым только у последней ступени`;
    if(i>0){
      const prevTo=parseFloat(steps[i-1].до);
      const curFrom=parseFloat(st.от);
      if(!isNaN(prevTo)&&!isNaN(curFrom)&&curFrom!==prevTo)return`ступени ${i} и ${i+1}: диапазоны должны идти без пробелов (${prevTo} ≠ ${curFrom})`;
    }
  }
  return null;
}

/** Check if JTL is loaded for the given month/year period */
function isJTLLoaded() {
  return (APP.deals && APP.deals.length > 0);
}

/** Check if JTL was loaded specifically for a period (saved in snapshot) */
function isJTLLoadedForPeriod(period) {
  if (!period) return false;
  // Live check
  if (period === '__live__' || period.isLive) return isJTLLoaded();
  // Saved period: check jtlLoaded flag, provDeals, or any prov > 0 in summary
  if (period.jtlLoaded === true) return true;
  if (period.provDeals && period.provDeals.length > 0) return true;
  if (period.summary && period.summary.some(r => (r.prov||0) > 0)) return true;
  return false;
}

/** Get the Verkaeufer name to use for JTL matching.
 *  Uses verkaeufer_name if set, falls back to manager_name. */
function getVerkaeufer(entry) {
  const vk = (entry.verkaeufer_name || '').trim();
  return vk || (entry.manager_name || '').trim();
}

function runPayroll() {
  const raw=APP.raw, managers=APP.managers, dedup=APP.dedup;
  const allTypes=raw.map(r=>classify(r));
  const meta=extractMeta(raw);
  const allRows=buildRows(raw);
  const{fresh,dupes}=dedupRows(allRows,dedup);
  const agg=aggByMgr(fresh.filter(r=>!r.isService));
  const inReport=new Set(agg.map(m=>m.name.trim()));
  const results=[],errors=[],provErrors=[];

  // Managers in report
  agg.forEach(m=>{
    // Match manager by ERP name, also try verkaeufer_name match
    const e=managers.find(d=>d.manager_name.trim()===m.name.trim())
         || managers.find(d=>(d.verkaeufer_name||'').trim()===m.name.trim());
    if(!e){errors.push({manager:m.name,issue:'Не найден в справочнике',base:m.goodsSum});return;}
    if(e['активен']===false)return;
    const fr=calcFixed(e,m.goodsSum);
    if(fr.err){errors.push({manager:m.name,issue:fr.rule,base:m.goodsSum});return;}
    const br=calcBonus(e,m.goodsSum);
    // Check if a deal's dk is in ddDedup — and find which period it was counted in
    // ────────────────────────────────────────────────────────────────────
    // Provizion base from JTL deals
    const deals=APP.deals||[];
    const vkName=getVerkaeufer(e); // use verkaeufer_name if set
    const provDealsForMgr=deals.filter(d=>
      (d.status==='авто'||d.status==='вручную_ок'||d.status==='совместная'||d.status==='учтена')
      &&(d.verkaeufer||'').trim()===vkName
    );
    const provBase=provDealsForMgr.reduce((s,d)=>{
      if(d.status==='совместная'&&d.joint){
        const sh=d.joint.find(j=>j.manager.trim()===m.name.trim()||j.manager.trim()===vkName);
        return s+(sh?d.gesamtbetrag*sh.pct/100:0);
      }
      return s+(d.gesamtbetrag||0);
    },0);

    // Diagnostic: JTL has deals for this period but none matched this manager name
    const totalJTLDeals=deals.filter(d=>d.status==='авто'||d.status==='вручную_ок'||d.status==='совместная'||d.status==='учтена').length;
    if(provBase===0&&totalJTLDeals>0&&e['настройки_провизиона']&&e['настройки_провизиона']['тип_ставки']){
      const allVerks=[...new Set(deals.map(d=>(d.verkaeufer||'').trim()).filter(Boolean))];
      provErrors.push({
        manager:m.name,
        issue:'Провизионная база = 0. Искали по имени «'+vkName+'». В JTL: '+allVerks.slice(0,8).join(', ')+(allVerks.length>8?'…':'')+'. Установите поле «Имя в JTL» в карточке менеджера.',
        provBase:0,receipts:m.totalReceived,isDiag:true
      });
    }

    const pr=calcProv(e,provBase,m.totalReceived);
    if(pr.err)provErrors.push({manager:m.name,issue:pr.rule,provBase,receipts:m.totalReceived});
    const thr=e['минимальный_порог'],td=(!thr&&thr!==0)?'нет':fmt(parseFloat(thr));
    results.push({manager:m.name,mode:e['режим_фикса']||'—',group:e['группа_фикса']||'—',empType:e['тип_занятости']||'—',
      base:m.goodsSum,received:m.totalReceived,threshold:td,
      fixedSalary:fr.fixed,bonus:br.bonus,bonusDetail:br.detail,
      provBase,prov:pr.err?0:pr.prov,provRule:pr.rule,provOk:!pr.err,
      total:fr.fixed+br.bonus+(pr.err?0:pr.prov),rule:fr.rule,inReport:true,rows:m.rows});
  });

  // Active managers not in report (ERP) — but may still have JTL deals
  managers.forEach(e=>{
    if(e['активен']===false)return;
    if(!e.manager_name||!e.manager_name.trim())return;
    if(inReport.has(e.manager_name.trim()))return;

    const fr=calcFixed(e,0);
    if(fr.err){errors.push({manager:e.manager_name,issue:fr.rule+' (нет в отчёте)',base:0});}

    // Calculate provizion from JTL even if no ERP receipts
    const dealsAll=APP.deals||[];
    const vkName2=getVerkaeufer(e);
    const provBase2=dealsAll
      .filter(d=>(d.status==='авто'||d.status==='вручную_ок'||d.status==='совместная'||d.status==='учтена')
                &&(d.verkaeufer||'').trim()===vkName2)
      .reduce((s,d)=>{
        if(d.status==='совместная'&&d.joint){
          const sh=d.joint.find(j=>j.manager.trim()===e.manager_name.trim()||j.manager.trim()===vkName2);
          return s+(sh?d.gesamtbetrag*sh.pct/100:0);
        }
        return s+(d.gesamtbetrag||0);
      },0);

    // Skip entirely if no fixed salary AND no JTL deals
    if(fr.fixed===0&&provBase2===0)return;

    const pr2=calcProv(e,provBase2,0); // receipts=0 for threshold check
    if(pr2.err)provErrors.push({manager:e.manager_name,issue:pr2.rule,provBase:provBase2,receipts:0});

    const thr=e['минимальный_порог'],td=(!thr&&thr!==0)?'нет':fmt(parseFloat(thr));
    const fixedSal=fr.err?0:fr.fixed;
    results.push({
      manager:e.manager_name,mode:e['режим_фикса']||'—',group:e['группа_фикса']||'—',empType:e['тип_занятости']||'—',
      base:0,received:0,threshold:td,
      fixedSalary:fixedSal,bonus:0,bonusDetail:'',bonusSteps:[],
      provBase:provBase2,prov:pr2.err?0:pr2.prov,provRule:pr2.rule,provOk:!pr2.err,
      total:fixedSal+(pr2.err?0:pr2.prov),
      rule:fr.err?fr.rule+' (нет в отчёте)':fr.rule+' (нет продаж в периоде)',
      inReport:false,rows:[]
    });
  });

  return{meta,allTypes,allRows,fresh,dupes,results,errors,provErrors};
}

function handleXLSX(file) {
  APP.fileName=file.name;
  ['ov','fp','ded','prev','str'].forEach(id=>{ const el=document.getElementById(id); if(el)el.innerHTML='<div class="loading"><div class="spin"></div>Читаем файл…</div>'; });
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const wb=XLSX.read(ev.target.result,{type:'array',cellDates:false});
      APP.sheetName=wb.SheetNames[0];
      APP.raw=XLSX.utils.sheet_to_json(wb.Sheets[APP.sheetName],{header:1,defval:null,raw:true});
      APP.payroll=runPayroll();
      renderAll();
    }catch(e){
      const el=document.getElementById('ov');
      if(el)el.innerHTML=`<div class="eb"><h4>Ошибка чтения файла</h4>${e.message}</div>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function renderAll() {
  // Auto-update period selector from file meta
  if(APP.payroll&&APP.payroll.meta) {
    if(!APP.selMonth&&APP.payroll.meta.month) APP.selMonth=APP.payroll.meta.month;
    if(!APP.selYear &&APP.payroll.meta.year)  APP.selYear =APP.payroll.meta.year;
  }
  renderOv(); renderFp(); renderDed(); renderStr(); renderPrev();
  if(APP.currentTab==='mgr')renderMgr();
  if(APP.currentTab==='hist')renderHist();
  if(APP.currentTab==='prov'){renderDeals();renderProvPlat();}
}

function periodKey(month, year) {
  return `${year}-${String(month).padStart(2,'0')}`;
}

function savePeriod() {
  if(!APP.payroll) return;
  const{meta,results,errors,fresh,dupes,provErrors}=APP.payroll;
  // Use selected period (from selector) or fallback to meta from file
  const month = APP.selMonth || meta.month;
  const year  = APP.selYear  || meta.year;
  if(!month||!year){alert('Выберите период (месяц и год) перед сохранением.');return;}
  if(!results.length&&!errors.length){alert('Расчёт пустой — нет данных для сохранения.');return;}

  const key=periodKey(month,year);
  // 1. Register payment rows in dedup (fiks/bonus dedup)
  fresh.forEach(r=>APP.dedup.add(r._dk));
  saveDedup(APP.dedup);

  // 2. Snapshot deals that are in provizion for this period
  const deals=APP.deals||[];
  const provDeals=deals.filter(d=>d.status===DS.AUTO||d.status===DS.OK||d.status===DS.JOINT||d.status===DS.COUNTED);
  const provDealsDup=deals.filter(d=>d.status===DS.DUP);
  const provDealsQuar=deals.filter(d=>d.status===DS.QUAR);
  const provDealsManual=deals.filter(d=>d.status===DS.MANUAL);
  const provDealsExcl=deals.filter(d=>d.status===DS.EXCL);

  // 3. Register provizion deals in ddDedup registry
  provDeals.forEach(d=>{
    APP.ddDedup.add(d.dk);
    d.status=DS.COUNTED;
    d.reason=`Учтена в периоде ${MONTHS[month]} ${year}`; d.period=key;
  });
  saveDDDedup(APP.ddDedup);
  saveDeals(APP.deals);

  // 4. Build period snapshot
  const periodData = {
    key, month, year,
    jtlLoaded: isJTLLoaded(),
    savedAt: new Date().toISOString(),
    fileName: APP.fileName,
    status: 'сохранён',
    summary: results.map(r=>({
      manager:r.manager, base:r.base, received:r.received||0,
      fixedSalary:r.fixedSalary, bonus:r.bonus, bonusDetail:r.bonusDetail||'',
      prov:r.prov||0, provBase:r.provBase||0, provRule:r.provRule||'',
      total:r.total, rule:r.rule, inReport:r.inReport
    })),
    errors: errors||[],
    provErrors: provErrors||[],
    // Deal snapshots
    provDeals: provDeals.map(d=>({
      dk:d.dk, bestellnummer:d.bestellnummer, rechnungsnummer:d.rechnungsnummer,
      verkaeufer:d.verkaeufer, firma:d.firma, plattform:d.plattform,
      gesamtbetrag:d.gesamtbetrag, status:d.status,
      joint:d.joint||null, reason:d.reason
    })),
    dupDeals: provDealsDup.map(d=>({dk:d.dk,bestellnummer:d.bestellnummer,verkaeufer:d.verkaeufer,reason:d.reason})),
    quarDeals: provDealsQuar.map(d=>({bestellnummer:d.bestellnummer,verkaeufer:d.verkaeufer,reason:d.reason})),
    manualDeals: provDealsManual.map(d=>({bestellnummer:d.bestellnummer,verkaeufer:d.verkaeufer,reason:d.reason})),
    exclDeals: provDealsExcl.map(d=>({bestellnummer:d.bestellnummer,verkaeufer:d.verkaeufer,plattform:d.plattform})),
    freshCount:fresh.length, dupeCount:dupes.length,
    provCount:provDeals.length, dupCount:provDealsDup.length,
  };

  // 5. Save to history (replace if same key)
  const hist=APP.hist.filter(h=>h.key!==key);
  hist.unshift(periodData);
  APP.hist=hist.slice(0,24);
  saveHist(APP.hist);

  alert(`✓ Период ${MONTHS[month]} ${year} сохранён.\n${provDeals.length} сделок зарегистрировано в провизионе.`);
  renderHist();
  renderDeals();
}

  h+=`<div style="margin-top:10px"><button class="btn btn-s btn-sm" onclick="clearDedup()">Очистить реестр дублей</button></div>`;
  document.getElementById('ded').innerHTML=h;
}

function renderPrev() {
  const cont = document.getElementById('prev');
  if(!APP.payroll && !(APP.deals&&APP.deals.length)){cont.innerHTML='<div style="color:#aaa;padding:20px">Загрузите файл отчёта для отображения данных.</div>';return;}

  let h = '';

  // ── ERP rows ─────────────────────────────────────────────
  if(APP.payroll) {
    const {fresh, dupes, allRows} = APP.payroll;
    // Show fresh rows only (non-duplicates), all of them
    const freshRows = fresh; // already filtered from dedupRows
    const svcRows = freshRows.filter(r=>r.isService);
    const goodsRows = freshRows.filter(r=>!r.isService);

    h += `<div class="sh">📄 ERP / 1С — данные отчёта (${freshRows.length} строк)</div>`;
    h += `<div class="cards" style="margin-bottom:12px">
      <div class="card g"><div class="clbl">Товарные строки</div><div class="cval">${goodsRows.length}</div></div>
      <div class="card"><div class="clbl">Услуги</div><div class="cval" style="color:#888">${svcRows.length}</div></div>
      <div class="card r"><div class="clbl">Исключено дублей</div><div class="cval">${dupes.length}</div></div>
      <div class="card"><div class="clbl">Всего строк в файле</div><div class="cval">${allRows.length}</div></div>
    </div>`;
    if(freshRows.length) {
      h += `<div class="tw"><table><thead><tr><th>Тип</th><th>Дата</th><th>Менеджер</th><th>Контрагент</th>
        <th>Артикул</th><th>Наименование</th><th style="text-align:right">Получено</th>
        <th style="text-align:right">Товар б/НДС</th><th style="text-align:right">Услуги б/НДС</th><th>Документ</th></tr></thead>
        <tbody>${freshRows.map(r=>`<tr>
          <td><span class="pill ${r.isService?'pgr':'pg'}">${r.isService?'услуга':'товар'}</span></td>
          <td>${r.date}</td><td>${r.manager}</td>
          <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${eh(r.counterpart)}">${eh(r.counterpart)}</td>
          <td class="mono">${eh(r.article)}</td>
          <td title="${eh(r.name)}" style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${eh(r.name)}</td>
          <td style="text-align:right" class="mono">${fmt(r.received)}</td>
          <td style="text-align:right" class="mono ${!r.isService?'tg':''}">${fmt(r.goodsNoVat)}</td>
          <td style="text-align:right" class="mono">${fmt(r.serviceNoVat)}</td>
          <td style="font-size:10px">${r.docType==='bank'?'🏦 банк':'💵 касса'}</td>
        </tr>`).join('')}
        </tbody></table></div>`;
    }
  } else {
    h += `<div class="wb">📄 ERP-отчёт не загружен. Загрузите XLSX-файл для просмотра данных поступлений.</div>`;
  }

  // ── JTL deals (active only — exclude quarantine/excluded/duplicates) ──
  const deals = APP.deals || [];
  const activeDealStatuses = [DS.AUTO, DS.OK, DS.JOINT, DS.COUNTED];
  const activeDeals = deals.filter(d=>activeDealStatuses.includes(d.status));
  const skippedDeals = deals.filter(d=>[DS.EXCL,DS.QUAR,DS.MANUAL,DS.DUP].includes(d.status));

  if(deals.length) {
    h += `<div class="sh" style="margin-top:18px">📦 JTL — сделки периода (${activeDeals.length} активных / ${deals.length} всего)</div>`;
    h += `<div class="cards" style="margin-bottom:12px">
      <div class="card g"><div class="clbl">Авто-закрытые</div><div class="cval">${deals.filter(d=>d.status===DS.AUTO).length}</div></div>
      <div class="card g"><div class="clbl">Подтверждены вручную</div><div class="cval">${deals.filter(d=>d.status===DS.OK||d.status===DS.COUNTED).length}</div></div>
      <div class="card b"><div class="clbl">Совместные</div><div class="cval">${deals.filter(d=>d.status===DS.JOINT).length}</div></div>
      <div class="card r"><div class="clbl">Не включены (карантин/дубли/исключены)</div><div class="cval">${skippedDeals.length}</div></div>
    </div>`;
    if(activeDeals.length) {
      h += `<div class="tw"><table><thead><tr>
          <th>Bestell-Nr</th><th>Datum</th><th>Verkaeufer</th><th>Firma</th>
          <th>Plattform</th><th>MwSt</th><th style="text-align:right">Betrag EUR</th>
          <th>Rechnung-Nr</th><th>Status</th><th>Совместная</th>
        </tr></thead><tbody>
        ${activeDeals.map(d=>`<tr>
          <td class="mono" style="font-size:10px">${eh(d.bestellnummer)}</td>
          <td style="font-size:11px">${eh(d.bestelldatum||'')}</td>
          <td>${eh(d.verkaeufer||'')}</td>
          <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${eh(d.firma||'')}">${eh(d.firma||'')}</td>
          <td style="font-size:11px">${eh(d.plattform||'')}</td>
          <td style="text-align:center">${d.mwst>0?d.mwst+'%':'<span class="tm">0%</span>'}</td>
          <td style="text-align:right" class="mono tg">${fmt(d.gesamtbetrag||0)}</td>
          <td style="font-size:10px" class="mono">${eh(d.rechnungsnummer||'—')}</td>
          <td>${statusBadge(d.status)}</td>
          <td style="font-size:10px">${d.joint?d.joint.map(j=>`${j.manager}: ${j.pct}%`).join(', '):'—'}</td>
        </tr>`).join('')}
        </tbody></table></div>`;
    } else {
      h += `<div style="color:#aaa;font-size:13px;padding:10px 0">Нет активных JTL-сделок (все в карантине, исключены или дубли).</div>`;
    }
    if(skippedDeals.length) {
      h += `<p style="font-size:11px;color:#aaa;margin-top:6px">Не показаны: ${skippedDeals.length} сделок (карантин: ${deals.filter(d=>d.status===DS.QUAR).length}, исключены: ${deals.filter(d=>d.status===DS.EXCL).length}, дубли: ${deals.filter(d=>d.status===DS.DUP).length}, ручная проверка: ${deals.filter(d=>d.status===DS.MANUAL).length})</p>`;
    }
  }

  cont.innerHTML = h;
}

function renderHist() {
  const MONTHS=['','Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const cont = document.getElementById('hist'); if(!cont) return;
  const hist = APP.hist;
  const ddCount = APP.ddDedup ? APP.ddDedup.size : 0;

  const ddNote = '<div class="mbx" style="margin-bottom:14px">'
    + '<div class="mrow"><span class="mk">Реестр учтённых сделок провизиона</span>'
    + '<span class="mv">' + ddCount + ' сделок зарегистрировано</span></div>'
    + '<div class="mrow"><span class="mk" style="color:#888">Защита от дублей</span>'
    + '<span style="font-size:11px;color:#666">При загрузке JTL новые дубли автоматически исключаются из расчёта</span></div>'
    + (ddCount > 0
      ? '<div style="margin-top:8px"><button class="btn btn-d btn-sm" onclick="clearDDRegistry()">Очистить реестр учтённых сделок</button></div>'
      : '')
    + '</div>';

  if (!hist.length) {
    cont.innerHTML = ddNote
      + '<div style="color:#aaa;padding:20px 0;font-size:13px">'
      + '<p>Нет сохранённых периодов.</p>'
      + '<p style="margin-top:8px;font-size:11px">Загрузите файл и нажмите «💾 Сохранить расчёт» на вкладке Обзор.</p>'
      + '</div>';
    return;
  }

  let cards = '';
  hist.forEach(function(p) {
    const key = p.key || periodKey(p.month, p.year);
    const totFix   = p.summary.reduce(function(x,r){return x+r.fixedSalary;}, 0);
    const totBonus = p.summary.reduce(function(x,r){return x+(r.bonus||0);}, 0);
    const totProv  = p.summary.reduce(function(x,r){return x+(r.prov||0);}, 0);
    const totTotal = p.summary.reduce(function(x,r){return x+r.total;}, 0);
    const isOpen   = APP.histView === key;

    const stClass = p.status==='утверждён' ? 'pg' : p.status==='сохранён' ? 'pb' : 'pgr';
    const stLabel = p.status || 'сохранён';
    const approveBtn = p.status !== 'утверждён'
      ? '<button class="btn btn-s btn-sm" onclick="event.stopPropagation();approvePeriod(\'' + key + '\')" title="Утвердить">✓ Утвердить</button>'
      : '';

    cards += '<div class="hcard' + (isOpen?' open':'') + '" onclick="toggleHist(\'' + key + '\')">'
      + '<div class="hhead">'
      + '<strong>' + MONTHS[p.month] + ' ' + p.year + '</strong>'
      + '<span class="pill ' + stClass + '" style="margin-left:6px">' + stLabel + '</span>'
      + '<span class="hdate">' + new Date(p.savedAt).toLocaleDateString('ru-RU') + '</span>'
      + approveBtn
      + '<button class="btn btn-d btn-sm" onclick="event.stopPropagation();deleteHist(\'' + key + '\')">✕</button>'
      + '</div>'
      + '<div class="hstats">'
      + '<span>Фикс: <strong>' + fmt(totFix) + ' EUR</strong></span>'
      + '<span>Бонус: <strong>' + fmt(totBonus) + ' EUR</strong></span>'
      + '<span>Провизион: <strong class="tv">' + fmt(totProv) + ' EUR</strong></span>'
      + '<span>Итого: <strong class="tg">' + fmt(totTotal) + ' EUR</strong></span>'
      + '<span class="hmeta">' + p.summary.length + ' менеджер(а) · ' + (p.provDeals||[]).length + ' сделок · ' + (p.dupDeals||[]).length + ' дублей</span>'
      + '</div>'
      + '</div>'
      + (isOpen ? renderHistDetail(p) : '');
  });

  cont.innerHTML = ddNote + '<div class="hlist">' + cards + '</div>';
}


function toggleHist(k){APP.histView=APP.histView===k?null:k;renderHist();}
function deleteHist(k){
  if(!confirm('Удалить период? Сделки из этого периода останутся в реестре учтённых.'))return;
  APP.hist=APP.hist.filter(h=>(h.key||periodKey(h.month,h.year))!==k);
  saveHist(APP.hist);if(APP.histView===k)APP.histView=null;renderHist();
}
function approvePeriod(k){
  const p=APP.hist.find(h=>(h.key||periodKey(h.month,h.year))===k);
  if(!p){return;}
  if(p.status==='утверждён'){alert('Период уже утверждён.');return;}
  if(!confirm('Утвердить период? После утверждения сделки не будут пересматриваться.'))return;
  p.status='утверждён';saveHist(APP.hist);renderHist();
}

function renderHistDetail(p){
  const key = p.key || periodKey(p.month, p.year);
  const dtab = APP.histDetailTab || 'salary';
  const tF=p.summary.reduce((x,r)=>x+r.fixedSalary,0);
  const tB=p.summary.reduce((x,r)=>x+r.bonus,0);
  const tP=p.summary.reduce((x,r)=>x+(r.prov||0),0);
  const tT=p.summary.reduce((x,r)=>x+r.total,0);

  const salTable=`<div class="tw"><table><thead><tr>
    <th>Менеджер</th><th style="text-align:right">База поступлений</th>
    <th style="text-align:right">База провизиона</th>
    <th style="text-align:right">Фикс</th><th style="text-align:right">Бонус</th>

  ${p.summary.map(r=>`<tr>

    <td style="text-align:right" class="mono tg">${fmt(r.fixedSalary)}</td>
    <td style="text-align:right" class="mono tb">${fmt(r.bonus)}</td>
    <td style="text-align:right" class="mono tv">${fmt(r.prov||0)}</td>
    <td style="text-align:right" class="mono fw">${fmt(r.total)}</td>
    <td class="rcol">${r.rule}${r.bonusDetail?`<br><span class="bdet">${r.bonusDetail}</span>`:''}${r.provRule?`<br><span class="pdet">${r.provRule}</span>`:''}</td>
  </tr>`).join('')}
  <tr class="trow"><td class="tlbl" colspan="3">Итого:</td>
    <td class="mono tg">${fmt(tF)}</td><td class="mono tb">${fmt(tB)}</td>
    <td class="mono tv">${fmt(tP)}</td><td class="mono fw">${fmt(tT)}</td><td></td>
  </tr></tbody></table></div>`;

  const pDeals=p.provDeals||[];
  const dealsTable=pDeals.length?`<div class="sh" style="margin-top:14px;font-size:12px">✅ Сделки в провизионе (${pDeals.length})</div>
    <div class="tw"><table><thead><tr>
      <th>Bestell-Nr</th><th>Verkaeufer</th><th>Firma</th><th>Plattform</th>
      <th style="text-align:right">Betrag, EUR</th><th>Совместная</th>
    </tr></thead><tbody>
    ${pDeals.map(d=>`<tr>
      <td class="mono" style="font-size:10px">${d.bestellnummer}</td>
      <td>${d.verkaeufer}</td>
      <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.firma||''}</td>
      <td style="font-size:11px">${d.plattform||''}</td>
      <td style="text-align:right" class="mono">${fmt(d.gesamtbetrag||0)}</td>
      <td>${d.joint?d.joint.map(j=>`${j.manager}: ${j.pct}%`).join(', '):'—'}</td>
    </tr>`).join('')}
    </tbody></table></div>`:'';

  const dDeals=p.dupDeals||[];
  const dupTable=dDeals.length?`<div class="sh" style="margin-top:14px;font-size:12px">🔄 Дубли исключены (${dDeals.length})</div>
    <div class="tw"><table><thead><tr><th>Bestell-Nr</th><th>Verkaeufer</th><th>Причина</th></tr></thead>
    <tbody>${dDeals.map(d=>`<tr><td class="mono" style="font-size:10px">${d.bestellnummer}</td><td>${d.verkaeufer}</td><td class="rcol">${d.reason}</td></tr>`).join('')}

  const qDeals=(p.quarDeals||[]).concat(p.manualDeals||[]);
  const qTable=qDeals.length?`<div class="sh" style="margin-top:14px;font-size:12px">⏳ Карантин / Ручная проверка (${qDeals.length})</div>

  const exclTable=(p.exclDeals||[]).length?`<div class="sh" style="margin-top:14px;font-size:12px">🚫 Исключены по платформе (${(p.exclDeals||[]).length})</div>
    <div class="tw"><table><thead><tr><th>Bestell-Nr</th><th>Verkaeufer</th><th>Plattform</th></tr></thead>
    <tbody>${(p.exclDeals||[]).map(d=>`<tr><td class="mono" style="font-size:10px">${d.bestellnummer}</td><td>${d.verkaeufer}</td><td>${d.plattform||''}</td></tr>`).join('')}

  const errTable = p.errors && p.errors.length

        <div class="fsl" style="font-weight:700">Итого к выплате</div>
        <div class="fsv">${fmt(tT)} EUR</div>
      </div>

    ${dtab==='salary'?salTable:''}
    ${dtab==='deals'?dealsTable:''}
    ${dtab==='dupes'?dupTable:''}
    ${dtab==='quar'?qTable:''}
    ${dtab==='excl'?exclTable:''}
    ${errTable}
  </div>`;
}

function onModeChange(idx) {
  const isM=document.getElementById(`fm${idx}`).value==='вручную';
  const tog=(id,dis)=>{const el=document.getElementById(id);if(!el)return;el.style.opacity=dis?'0.4':'1';el.style.pointerEvents=dis?'none':'';el.querySelectorAll('input,select').forEach(x=>x.disabled=dis);};
  tog(`fg${idx}`,isM);tog(`fe${idx}`,isM);tog(`fman${idx}`,!isM);
}
function toggleAct(idx){APP.managers[idx]['активен']=APP.managers[idx]['активен']===false;saveMgr(APP.managers);renderMgr();if(APP.raw)rerun();}
function togglePH(idx){
  const ch=document.getElementById(`ph${idx}`)?.checked;
  const r1=document.getElementById(`phr${idx}`),r2=document.getElementById(`plr${idx}`);
  if(r1){r1.style.opacity=ch?'1':'0.4';r1.style.pointerEvents=ch?'':'none';r1.querySelectorAll('input,select').forEach(x=>x.disabled=!ch);}
  if(r2){r2.style.opacity=ch?'1':'0.4';r2.style.pointerEvents=ch?'':'none';r2.querySelectorAll('input,select').forEach(x=>x.disabled=!ch);}
}
function addBonus(idx){if(!APP.managers[idx]['бонусы'])APP.managers[idx]['бонусы']=[];APP.managers[idx]['бонусы'].push({планка:'',бонус:''});renderMgr();}
function delBonus(idx,si){APP.managers[idx]['бонусы'].splice(si,1);saveMgr(APP.managers);renderMgr();if(APP.raw)rerun();}
function saveMgrCard(idx){
  const g=id=>document.getElementById(id);
  const name=g(`fn${idx}`)?.value?.trim();
  if(!name){alert('Имя не может быть пустым');return;}
  const mode=g(`fm${idx}`)?.value,isM=mode==='вручную';
  if(isM&&isNaN(parseFloat(g(`fsal${idx}`)?.value))){alert('Укажите ручной оклад (число)');return;}
  const bRows=document.querySelectorAll(`#bs${idx} .bstep`);
  const bonuses=[];let bErr=false;
  bRows.forEach(r=>{const pl=r.querySelector('.bp')?.value?.trim(),bn=r.querySelector('.bb')?.value?.trim();
    if(!pl&&!bn)return;
    if(!pl||isNaN(parseFloat(pl))){alert('Планка бонуса должна быть числом');bErr=true;return;}
    if(!bn||isNaN(parseFloat(bn))){alert('Сумма бонуса должна быть числом');bErr=true;return;}
    bonuses.push({планка:parseFloat(pl),бонус:parseFloat(bn)});});
  if(bErr)return;
  // Provizion settings
  const pType=g(`pt${idx}`)?.value||'';
  let ps=null;
  if(pType){
    const pPct=g(`pp${idx}`)?.value?.trim();
    if(!pPct||isNaN(parseFloat(pPct))){alert('Укажите процент провизиона');return;}
    const pHas=g(`ph${idx}`)?.checked||false;
    const pMin=g(`pmin${idx}`)?.value?.trim();
    if(pHas&&(!pMin||isNaN(parseFloat(pMin)))){alert('Укажите минимум поступлений для порога');return;}
    ps={тип_ставки:pType,процент:parseFloat(pPct),есть_порог:pHas,
      минимум_поступлений:pHas?parseFloat(pMin):null,
      логика_порога:pHas?(g(`pl${idx}`)?.value||'считать только с суммы сверх порога'):null};
  }
  const thrRaw=g(`fthr${idx}`)?.value?.trim();
  const vkName = document.getElementById(`fvk${idx}`)?.value?.trim() || '';
  APP.managers[idx]={manager_name:name,verkaeufer_name:vkName||null,активен:APP.managers[idx]['активен']!==false,
    режим_фикса:mode,группа_фикса:g(`fgr${idx}`)?.value||'',тип_занятости:g(`fet${idx}`)?.value||'',
    ручной_фиксированный_оклад:isM?parseFloat(g(`fsal${idx}`)?.value):null,
    минимальный_порог:isM?(!thrRaw||thrRaw===''?null:parseFloat(thrRaw)):null,
    бонусы:bonuses,настройки_провизиона:ps};
  saveMgr(APP.managers);renderMgr();if(APP.raw)rerun();
}
function addMgr(){APP.managers.push({manager_name:'',активен:true,режим_фикса:'по группе',группа_фикса:'удалённый менеджер',тип_занятости:'полная занятость',бонусы:[],настройки_провизиона:null});renderMgr();}
function delMgr(idx){if(!confirm(`Удалить "${APP.managers[idx].manager_name}"?`))return;APP.managers.splice(idx,1);saveMgr(APP.managers);renderMgr();if(APP.raw)rerun();}

function onProvTypeChange(idx) {
  const type = document.getElementById(`pt${idx}`)?.value;
  const isStep = type === 'ступенчатая шкала';
  const pctRow = document.getElementById(`pp_row_${idx}`);
  const stepsEl = document.getElementById(`psteps${idx}`)?.closest('[id^="psteps"]')?.parentElement;
  if(pctRow){ pctRow.style.opacity=isStep?'0.4':'1'; pctRow.style.pointerEvents=isStep?'none':''; pctRow.querySelector('input').disabled=isStep; }
  // Re-render to show/hide steps block
  saveMgrCard(idx);
}

function addProvStep(idx) {
  const cont = document.getElementById(`psteps${idx}`); if(!cont) return;
  const div = document.createElement('div');
  div.className = 'bstep'; div.style.gridTemplateColumns = '1fr 1fr 1fr auto';
  div.innerHTML = `<input type="number" class="psf" placeholder="0"><input type="number" class="pst" placeholder="∞"><input type="number" class="pspct" placeholder="%" step="0.1"><button class="bdel" onclick="this.parentElement.remove()">✕</button>`;
  cont.appendChild(div);
}

function delProvStep(idx, si) {
  // Save current state, remove step, re-render
  const cont = document.getElementById(`psteps${idx}`); if(!cont) return;
  const rows = cont.querySelectorAll('.bstep');
  if(rows[si]) rows[si].remove();
}

function validateAndReadSteps(idx) {
  const cont = document.getElementById(`psteps${idx}`);
  if(!cont) return { steps:[], err:null };
  const rows = cont.querySelectorAll('.bstep');
  const steps = []; let err = null;
  rows.forEach((row, i) => {
    const fromVal = row.querySelector('.psf')?.value?.trim();
    const toVal   = row.querySelector('.pst')?.value?.trim();
    const pctVal  = row.querySelector('.pspct')?.value?.trim();
    if(!fromVal && !toVal && !pctVal) return; // skip empty
    if(!fromVal || isNaN(parseFloat(fromVal))) { err = `Ступень ${i+1}: поле "От" должно быть числом`; return; }
    if(toVal && isNaN(parseFloat(toVal))) { err = `Ступень ${i+1}: поле "До" должно быть числом`; return; }
    if(!pctVal || isNaN(parseFloat(pctVal))) { err = `Ступень ${i+1}: процент должен быть числом`; return; }
    if(i < rows.length-1 && !toVal) { err = `Ступень ${i+1}: "До" может быть пустым только у последней ступени`; return; }
    if(steps.length > 0) {
      const prevTo = steps[steps.length-1].до;
      if(prevTo != null && prevTo !== '' && parseFloat(prevTo) !== parseFloat(fromVal)) {
        err = `Ступени ${i} и ${i+1}: от=${fromVal} не совпадает с предыдущим до=${prevTo}`;
        return;
      }
    }
    steps.push({ от: parseFloat(fromVal), до: toVal ? parseFloat(toVal) : null, процент: parseFloat(pctVal) });
  });
  return { steps, err };
}



function clearDDDedup() {
  if(!confirm('Очистить реестр учтённых сделок провизиона?\nВсе сделки будут считаться новыми при следующей загрузке JTL.')) return;
  APP.ddDedup = new Set();
  saveDDDedup(APP.ddDedup);
  if(APP.deals&&APP.deals.length) {
    // Re-classify deals without ddDedup
    APP.deals.forEach(d=>{
      if(d.status===DS.COUNTED||d.status===DS.DUP) {
        d.status = DS.DUP; // will be re-evaluated on next load
      }
    });
  }
  renderHist();
  alert('Реестр учтённых сделок очищен.');
}


function clearDDRegistry() {
  if(!confirm('Очистить реестр учтённых сделок провизиона? Ранее учтённые сделки снова смогут попасть в расчёт.')) return;
  APP.ddDedup = new Set();
  saveDDDedup(APP.ddDedup);
  // Reset status of counted deals back to auto/ok
  (APP.deals||[]).forEach(d => {
    if(d.status === DS.COUNTED) { d.status = DS.AUTO; d.reason = 'Восстановлена после сброса реестра'; d.period = null; }
  });
  saveDeals(APP.deals);
  renderHist();
  if(APP.raw) rerun();
  alert('Реестр очищен. При следующей загрузке JTL сделки не будут помечаться как дубли.');
}

// Returns which period a deal was counted in (or null)
function getDealPeriod(dk) {
  for(const p of APP.hist) {
    if(p.provDeals && p.provDeals.some(d => d.dk === dk)) return p;
  }
  return null;
}

// JTL PIPELINE
// ═══════════════════════════════════════════════════════════
const DS={AUTO:'авто',QUAR:'карантин',MANUAL:'ручная_проверка',OK:'вручную_ок',EXCL:'исключена',DUP:'дубль',JOINT:'совместная',COUNTED:'учтена'};

function classifyJTL(row, excl, ddDedup) {
  const plat=(row['Plattformen']||'').trim();
  const mwst=parseFloat((row['MwSt']||'').replace('%','').replace(',','.'));
  const rech=(row['Rechnungsnummer']||'').trim();
  const lief=(row['Lieferschein']||'').trim();
  const vers=(row['Versanddatum']||'').trim();
  const bstNr=(row['Bestellnummer']||'').trim();
  const rechNr=(row['Rechnungsnummer']||'').trim();
  const verk=(row['Verkaeufer']||'').trim();
  const dk=`${bstNr}|${rechNr}|${verk}`;
  if(ddDedup.has(dk)){
      const periodRef=APP.hist.find(h=>(h.provDeals||[]).some(d=>d.dk===dk));
    const pNote=periodRef?` (${MONTHS[periodRef.month]} ${periodRef.year})`:'';
    return{status:DS.DUP,reason:`Уже учтена в провизионе${pNote}`,dk};
  }
  if(excl.includes(plat))return{status:DS.EXCL,reason:`Платформа исключена: ${plat}`,dk};
  if(isNaN(mwst)||mwst===0)return{status:DS.MANUAL,reason:'MwSt = 0 → ручная проверка',dk};
  if(rech&&(lief||vers))return{status:DS.AUTO,reason:'Rechnung + Lieferschein/Versanddatum',dk};
  const miss=[];if(!rech)miss.push('Rechnungsnummer');if(!lief&&!vers)miss.push('Lieferschein/Versanddatum');
  return{status:DS.QUAR,reason:`Карантин: нет ${miss.join(', ')}`,dk};
}

function parseCSV(text) {
  const lines=text.split('\n');if(!lines.length)return{header:[],rows:[]};
  const d=lines[0].split(';').length>=lines[0].split(',').length?';':',';
  const splitLine=line=>{const r=[];let cur='',inQ=false;
    for(const ch of line){if(ch==='"'){inQ=!inQ;}else if(ch===d&&!inQ){r.push(cur.replace(/^"|"$/g,'').trim());cur='';}else cur+=ch;}
    r.push(cur.replace(/^"|"$/g,'').trim());return r;};
  const header=splitLine(lines[0]);
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const l=lines[i].trim();if(!l)continue;
    const vals=splitLine(l);const obj={};
    header.forEach((h,j)=>obj[h]=vals[j]||'');
    if(obj['Bestellnummer'])rows.push(obj);
  }
  return{header,rows};
}

function _parseJTLDate(str) {
  if(!str)return null;
  // DD.MM.YYYY or YYYY-MM-DD
  let m=str.match(/^(\d{2})\.(\d{2})\.(\d{4})/);
  if(m)return new Date(+m[3],+m[2]-1,+m[1]);
  m=str.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m)return new Date(+m[1],+m[2]-1,+m[3]);
  return null;
}

function _checkJTLDateMismatch(deals) {
  if(!APP.payroll||!APP.payroll.meta)return null;
  const meta=APP.payroll.meta;
  if(!meta.month||!meta.year)return null;
  // Get date range from JTL bestelldatum
  const dates=deals.map(d=>_parseJTLDate(d.bestelldatum)).filter(Boolean);
  if(!dates.length)return null;
  const minD=new Date(Math.min(...dates.map(d=>d.getTime())));
  const maxD=new Date(Math.max(...dates.map(d=>d.getTime())));
  // Check if ERP period month/year is within JTL date range
  // At least some JTL orders should fall in the same month/year as ERP report
  const erpMonth=meta.month, erpYear=meta.year;
  const jtlMonths=new Set(dates.map(d=>`${d.getFullYear()}-${d.getMonth()+1}`));
  const erpKey=`${erpYear}-${erpMonth}`;
  if(!jtlMonths.has(erpKey)){
    const jtlPeriods=[...jtlMonths].sort().join(', ');
    return `Даты JTL-сделок (${_fmtDate(minD)}–${_fmtDate(maxD)}) не совпадают с периодом ERP-отчёта (${MONTHS[erpMonth]} ${erpYear}). Загрузите выгрузку отчёта по поступлениям за период JTL или корректный JTL-файл.`;
  }
  return null;
}

function _fmtDate(d){return d.toLocaleDateString('ru-RU');}

function loadJTLFromInput(input) {
  if(!input.files[0])return;

  // Guard: ERP report must be loaded first
  if(!APP.raw) {
    alert('⚠ Сначала загрузите основной отчёт о поступлениях (XLSX из ERP/1С).\n\nJTL-выгрузка является вспомогательным параметром и не может использоваться как единственный источник данных — в ней нет разбивки по товарам.');
    input.value='';
    return;
  }

  const reader=new FileReader();
  reader.onload=e=>{
    const{rows}=parseCSV(e.target.result);
    const excl=APP.provSettings.excludedPlatforms||[];
    const seen=new Set();
    APP.deals=rows.map((row,i)=>{
      const cl=classifyJTL(row,excl,APP.ddDedup);
      const isDupInFile=seen.has(cl.dk);if(!isDupInFile)seen.add(cl.dk);
      const status=isDupInFile?DS.DUP:cl.status;
      return{id:`jtl_${i}`,bestellnummer:row['Bestellnummer'],rechnungsnummer:row['Rechnungsnummer'],
        bestelldatum:row['Bestelldatum'],firma:row['Firma'],verkaeufer:row['Verkaeufer'],
        lieferland:row['Lieferland'],plattform:row['Plattformen'],zahlungsart:row['Zahlungsart'],
        lieferschein:row['Lieferschein'],versanddatum:row['Versanddatum'],
        mwst:parseFloat((row['MwSt']||'').replace('%','').replace(',','.'))||0,
        gesamtbetrag:parseFloat((row['Gesamtbetrag_Brutto']||'0').replace(',','.'))||0,
        status,reason:isDupInFile?'Дубль в файле':cl.reason,dk:cl.dk,joint:null};
    });
    saveDeals(APP.deals);

    // Check date mismatch
    APP.jtlDateWarning=_checkJTLDateMismatch(APP.deals);

    renderDeals();
    if(APP.raw){ rerun(); } // rerun also calls renderAll → renderPrev
    else { renderPrev(); }
  };
  reader.readAsText(input.files[0],'UTF-8');
}

  const hasRech = document.getElementById('doc-has_rechnung')?.checked;

  const errEl = document.getElementById('manual-req-err');
  const btn = document.getElementById(`manual-confirm-btn-${idx}`);
  if(errEl) errEl.style.display = ok ? 'none' : 'block';
  if(btn) { btn.disabled = !ok; btn.style.opacity = ok ? '1' : '0.5'; btn.style.cursor = ok ? 'pointer' : 'not-allowed'; }
}

function _toggleJointSection(idx) {
  const ch = document.getElementById(`is-joint-${idx}`)?.checked;

function _addJointRow2(idx) {
  const mgrOpts = (APP.managers||[]).filter(m=>m.manager_name&&m.manager_name.trim())
    .map(m=>`<option value="${eh(m.manager_name.trim())}">${eh(m.manager_name.trim())}</option>`).join('');
  const cont = document.getElementById(`joint-shares-${idx}`); if(!cont) return;
  const div = document.createElement('div'); div.className='bstep'; div.style.marginBottom='6px';
  div.innerHTML = `<select class="jm2" style="border:1px solid #d0d4e0;border-radius:6px;padding:5px 8px;font-size:12px;background:#fff;flex:1"><option value="">— выбрать менеджера —</option>${mgrOpts}</select><input type="number" class="jp2" value="" min="1" max="99" placeholder="%" style="border:1px solid #d0d4e0;border-radius:6px;padding:5px 8px;font-size:12px;width:70px" oninput="_updateJointTotal(${idx})"><button class="bdel" onclick="this.parentElement.remove();_updateJointTotal(${idx})">✕</button>`;
  cont.appendChild(div);
  _updateJointTotal(idx);
}

function _updateJointTotal(idx) {
  const cont = document.getElementById(`joint-shares-${idx}`); if(!cont) return;
  const rows = cont.querySelectorAll('.bstep');
  let sum = 0;
  rows.forEach(r => { const v=parseFloat(r.querySelector('.jp2')?.value); if(!isNaN(v)) sum+=v; });
  const tot = document.getElementById(`joint-total-${idx}`);
  if(tot) {
    const rem = Math.max(0, 100-sum);
    tot.textContent = `Сумма долей участников: ${sum.toFixed(1)}% → основной менеджер: ${rem.toFixed(1)}%`;
    tot.style.color = Math.abs(sum+rem-100)<0.01 ? '#1a7a3a' : '#c0392b';
  }
}

function confirmManual(idx) {
  // Validate required docs
  const hasRech = document.getElementById('doc-has_rechnung')?.checked;
  const hasLief = document.getElementById('doc-has_lieferschein')?.checked;
  if(!hasRech && !hasLief) {
    const errEl = document.getElementById('manual-req-err');
    if(errEl){ errEl.style.display='block'; errEl.scrollIntoView({block:'nearest'}); }
    return;
  }

  const ALL_DOC_IDS = ['has_rechnung','has_lieferschein','gelang','fracht','ausgang','andere'];
  const docs = {};
  ALL_DOC_IDS.forEach(id => { docs[id] = document.getElementById('doc-'+id)?.checked || false; });
  const checkedDocs = ALL_DOC_IDS.filter(id => docs[id]);
  const docLabels = { has_rechnung:'Rechnung', has_lieferschein:'Lieferschein', gelang:'Gelangenbestätigung', fracht:'CMR/Frachtenbrief', ausgang:'Ausgangsvermerk', andere:'Другой документ' };
  const docList = checkedDocs.map(id => docLabels[id]).join(', ');

  // Handle joint deal
  const isJoint = document.getElementById(`is-joint-${idx}`)?.checked;
  let jointShares = null;
  if(isJoint) {
    const cont = document.getElementById(`joint-shares-${idx}`);
    const rows = cont ? cont.querySelectorAll('.bstep') : [];
    const shares = [];
    rows.forEach(r => {
      const mgr = r.querySelector('.jm2')?.value?.trim();
      const pct = parseFloat(r.querySelector('.jp2')?.value);
      if(mgr && !isNaN(pct) && pct>0) shares.push({manager:mgr, pct});
    });
    if(shares.length) {
      const othersSum = shares.reduce((s,j)=>s+j.pct,0);
      const mainPct = Math.round((100-othersSum)*100)/100;
      if(mainPct < 0) { alert(`Сумма долей участников (${othersSum}%) превышает 100%.`); return; }
      const deal = APP.deals[idx];
      jointShares = [{manager:(deal.verkaeufer||deal.verkaeufer||''), pct:mainPct}, ...shares];
    }
  }

  const deal = APP.deals[idx];
  deal.status = jointShares ? DS.JOINT : DS.OK;
  deal.manualDocs = docs;
  deal.reason = `Подтверждена вручную: ${docList}`;
  if(jointShares) {
    deal.joint = jointShares;
    deal.reason = jointShares.map(s=>`${s.manager}: ${s.pct}%`).join(', ');
  }

  document.getElementById('confirm-modal')?.remove();
  saveDeals(APP.deals);
  renderDeals();
  if(APP.raw) rerun();
}
function countDeals(){
  const cl=APP.deals.filter(d=>d.status===DS.AUTO||d.status===DS.OK||d.status===DS.JOINT);
  if(!cl.length){alert('Нет закрытых сделок.\nДля регистрации периода используйте кнопку Сохранить на вкладке Обзор.');return;}
  // Register dk in ddDedup (protect from re-counting next month)
  // Keep status as COUNTED — provBase filter now includes COUNTED, so provizion stays calculated
  cl.forEach(d=>{
    APP.ddDedup.add(d.dk);
    d.status=DS.COUNTED;
    d.reason='Учтена в провизионе (зарегистрирована)';
  });
  saveDDDedup(APP.ddDedup);
  saveDeals(APP.deals);
  // Re-render deals view only — do NOT rerun() payroll since provBase now includes COUNTED
  renderDeals();
  // But DO recalculate to reflect COUNTED in provBase (now COUNTED is included in filter)
  if(APP.raw) rerun();
  alert('Зарегистрировано '+cl.length+' сделок.\nПровизион пересчитан. Для финального сохранения нажмите «💾 Сохранить расчёт» на вкладке Обзор.');
}

function mgrSelectHtml(selectedName, cls) {
  const opts = APP.managers
    .filter(m => m.manager_name && m.manager_name.trim())
    .map(m => {
      const name = m.manager_name.trim();
      const sel = name === (selectedName||'').trim() ? ' selected' : '';
      return '<option value="' + name + '"' + sel + '>' + name + '</option>';
    }).join('');
  return '<select class="' + cls + '" style="width:100%;border:1px solid #d0d4e0;border-radius:6px;padding:5px 8px;font-size:12px;background:#fff;outline:none">'
    + '<option value="">— выбрать менеджера —</option>'
    + opts
    + '</select>';
}

function openJoint(idx){
  const deal=APP.deals[idx];
  const existing=deal.joint||[{manager:deal.verkaeufer,pct:100}];
  const rid=`jr-${idx}`;
  const existing_row=document.getElementById(rid);
  if(existing_row){existing_row.remove();return;}
  const tbl=document.querySelector('#prov-deals .tw table tbody');if(!tbl)return;
  const newRow=document.createElement('tr');newRow.id=rid;
  newRow.innerHTML=`<td colspan="12" style="background:#f0f4ff;padding:12px 16px">
    <div style="background:#fff;border:1.5px solid #bfdbfe;border-radius:10px;padding:14px">
      <div class="sh" style="margin-bottom:10px">👥 Совместная: ${deal.bestellnummer} · ${fmt(deal.gesamtbetrag)} EUR</div>
      <div style="display:grid;grid-template-columns:1fr 80px auto;gap:6px;margin-bottom:4px;font-size:10px;color:#aaa"><span>Менеджер</span><span>%</span><span></span></div>
            <div id="jsh-${idx}">${existing.map((s,si)=>`<div class="bstep">${mgrSelectHtml(s.manager,'jm')}<input type="number" class="jp" value="${s.pct||''}" min="0" max="100" placeholder="%"><button class="bdel" onclick="this.parentElement.remove()">✕</button></div>`).join('')}</div>
      <button class="badd" onclick="addJS('${idx}')">+ Участник</button>
      <div id="jerr-${idx}" style="color:#c0392b;font-size:11px;margin-top:6px"></div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn-p btn-sm" onclick="saveJoint(${idx})">Сохранить</button>
        <button class="btn btn-s btn-sm" onclick="document.getElementById('${rid}').remove()">Отмена</button>
      </div>
    </div></td>`;
  const rows=tbl.querySelectorAll('tr');let target=null;
  rows.forEach(r=>{if(r.cells[0]?.textContent?.trim()===deal.bestellnummer)target=r;});
  if(target)target.insertAdjacentElement('afterend',newRow);else tbl.appendChild(newRow);
}
function addJS(idx){const c=document.getElementById(`jsh-${idx}`);if(!c)return;const d=document.createElement('div');d.className='bstep';d.innerHTML=mgrSelectHtml('','jm')+'<input type="number" class="jp" placeholder="%" min="0" max="100" style="border:1px solid #d0d4e0;border-radius:6px;padding:5px 8px;font-size:12px;background:#fff;width:90px"><button class="bdel" onclick="this.parentElement.remove()">✕</button>';c.appendChild(d);}
function saveJoint(idx){
  const c=document.getElementById(`jsh-${idx}`);if(!c)return;
  const shares=[];c.querySelectorAll('.bstep').forEach(r=>{const m=r.querySelector('.jm')?.value?.trim(),p=parseFloat(r.querySelector('.jp')?.value);if(m&&!isNaN(p))shares.push({manager:m,pct:p});});
  const total=shares.reduce((s,j)=>s+j.pct,0);
  if(Math.abs(total-100)>0.01){const e=document.getElementById(`jerr-${idx}`);if(e)e.textContent=`Сумма долей = ${total.toFixed(1)}%, должно быть 100%`;return;}
  APP.deals[idx].joint=shares;APP.deals[idx].status=DS.JOINT;APP.deals[idx].reason=shares.map(s=>`${s.manager}: ${s.pct}%`).join(', ');
  saveDeals(APP.deals);document.getElementById(`jr-${idx}`)?.remove();renderDeals();if(APP.raw)rerun();
}

function renderProvPlat() {
  const cont=document.getElementById('prov-plat');if(!cont)return;
  const s=APP.provSettings;
  const all=[...new Set([...DEFAULT_PROV.excludedPlatforms,...(APP.deals||[]).map(d=>d.plattform).filter(Boolean),...(s.allPlatforms||[])])].sort();
  cont.innerHTML=`<div class="sh">Настройки провизиона — исключаемые платформы</div>
    <p style="font-size:12px;color:#888;margin-bottom:14px">Отмеченные платформы не участвуют в провизионе.</p>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
      ${all.map(p=>{const ch=s.excludedPlatforms.includes(p);return`<label style="display:flex;align-items:center;gap:10px;font-size:13px;cursor:pointer">
        <input type="checkbox" ${ch?'checked':''} onchange="togglePlat('${p}',this.checked)" style="width:16px;height:16px">
        <span>${p}</span> <span class="pill ${ch?'pr':'pg'}">${ch?'исключена':'участвует'}</span>
      </label>`;}).join('')}
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <input type="text" id="newPlat" placeholder="Добавить платформу..." style="border:1px solid #d0d4e0;border-radius:6px;padding:6px 10px;font-size:12px;width:220px">
      <button class="btn btn-s btn-sm" onclick="addPlat()">+ Добавить</button>
    </div>`;
}
function togglePlat(p,ex){const s=APP.provSettings;if(ex){if(!s.excludedPlatforms.includes(p))s.excludedPlatforms.push(p);}else{s.excludedPlatforms=s.excludedPlatforms.filter(x=>x!==p);}saveProv(s);renderProvPlat();}
function addPlat(){const v=document.getElementById('newPlat')?.value?.trim();if(!v)return;const s=APP.provSettings;if(!s.allPlatforms)s.allPlatforms=[];if(!s.allPlatforms.includes(v))s.allPlatforms.push(v);saveProv(s);document.getElementById('newPlat').value='';renderProvPlat();}
