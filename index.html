<script>
// ═══════════════════════════════════════════════════════════
// PAYROLL STATEMENT (ВЕДОМОСТЬ)
// ═══════════════════════════════════════════════════════════

// APP state for ведомость
// APP.vedPeriod = selected period key
// APP.vedOpenMgr = set of open manager names
// APP.vedSearch = search string

function renderVed() {
  const cont = document.getElementById('ved');
  if (!cont) return;

  if (!APP.vedOpenMgr) APP.vedOpenMgr = new Set();

  const hist = APP.hist || [];

  // ── Period selector ──────────────────────────────────────
  // Default to most recent saved period, or current calc period
  if (!APP.vedPeriod && hist.length) APP.vedPeriod = hist[0].key || periodKey(hist[0].month, hist[0].year);

  const selOptions = hist.map(p => {
    const k = p.key || periodKey(p.month, p.year);
    return '<option value="' + k + '"' + (APP.vedPeriod === k ? ' selected' : '') + '>'
      + MONTHS[p.month] + ' ' + p.year
      + (p.status === 'утверждён' ? ' ✓' : p.status === 'сохранён' ? ' (сохранён)' : ' (черновик)')
      + '</option>';
  }).join('');

  // Also add "текущий расчёт" option if there's a live payroll
  const hasLive = APP.payroll && APP.payroll.results && APP.payroll.results.length;
  const liveOption = hasLive
    ? '<option value="__live__"' + (APP.vedPeriod === '__live__' ? ' selected' : '') + '>▶ Текущий расчёт (не сохранён)</option>'
    : '';

  if (!hist.length && !hasLive) {
    cont.innerHTML = '<div style="color:#aaa;padding:30px 0;text-align:center">'
      + '<div style="font-size:32px;margin-bottom:8px">📋</div>'
      + '<p>Нет сохранённых периодов.</p>'
      + '<p style="font-size:11px;margin-top:8px">Загрузите файл, рассчитайте и нажмите «Сохранить расчёт» на вкладке Обзор.</p>'
      + '</div>';
    return;
  }

  // ── Load period data ──────────────────────────────────────
  let period = null;
  let isLive = false;
  let periodJtlMissing = false; // will be set below

  if (APP.vedPeriod === '__live__' && hasLive) {
    // Build pseudo-period from live payroll
    const meta = APP.payroll.meta;
    period = {
      month: meta.month || (APP.selMonth || new Date().getMonth()+1),
      year:  meta.year  || (APP.selYear  || new Date().getFullYear()),
      status: 'черновик',
      savedAt: new Date().toISOString(),
      fileName: APP.fileName || '—',
      summary: APP.payroll.results.map(r => ({
        manager: r.manager, base: r.base, received: r.received||0,
        fixedSalary: r.fixedSalary, bonus: r.bonus, bonusDetail: r.bonusDetail||'',
        bonusSteps: r.bonusSteps||[], prov: r.prov||0, provBase: r.provBase||0,
        provRule: r.provRule||'', total: r.total, rule: r.rule, inReport: r.inReport,
      })),
      provDeals: (APP.deals||[]).filter(d => d.status === 'авто' || d.status === 'вручную_ок' || d.status === 'совместная' || d.status === 'учтена'),
      dupDeals: (APP.deals||[]).filter(d => d.status === 'дубль'),
      quarDeals: (APP.deals||[]).filter(d => d.status === 'карантин'),
      manualDeals: (APP.deals||[]).filter(d => d.status === 'ручная_проверка'),
      exclDeals: (APP.deals||[]).filter(d => d.status === 'исключена'),
      errors: APP.payroll.errors||[],
      provErrors: APP.payroll.provErrors||[],
    };
    isLive = true;
  } else if (APP.vedPeriod) {
    period = hist.find(h => (h.key || periodKey(h.month, h.year)) === APP.vedPeriod);
  }

  // Determine if JTL is missing for this period
  // Only show warning if provizion is configured AND no prov data is available
  const _hasProv = period && period.summary && period.summary.some(r => (r.prov||0) > 0);
  if (isLive) {
    periodJtlMissing = !isJTLLoaded() && anyProvConfigured() && !_hasProv;
  } else if (period) {
    // For saved periods: if any manager has prov > 0, JTL was loaded at save time
    periodJtlMissing = !isJTLLoadedForPeriod(period) && anyProvConfigured() && !_hasProv;
  }

  if (!period) {
    cont.innerHTML = '<div class="eb"><h4>Период не найден</h4>Выберите другой период или сохраните текущий расчёт.</div>';
    return;
  }

  // ── Validate snapshot ────────────────────────────────────
  if (!period.summary || !period.summary.length) {
    cont.innerHTML = '<div class="eb"><h4>Snapshot повреждён или пустой</h4>В периоде нет данных по менеджерам. Пересчитайте и сохраните период заново.</div>';
    return;
  }

  // ── Totals ────────────────────────────────────────────────
  const totFix   = period.summary.reduce((x,r) => x + r.fixedSalary, 0);
  const totBonus = period.summary.reduce((x,r) => x + (r.bonus||0), 0);
  const totProv  = period.summary.reduce((x,r) => x + (r.prov||0), 0);
  const totTotal = period.summary.reduce((x,r) => x + r.total, 0);
  const provDeals  = period.provDeals  || [];
  const dupDeals   = period.dupDeals   || [];

  // Status badge
  const stMap = { 'утверждён': 'pg', 'сохранён': 'pb', 'черновик': 'pgr' };
  const stClass = stMap[period.status] || 'pgr';

  // ── Search filter ─────────────────────────────────────────
  const search = (APP.vedSearch || '').toLowerCase();
  let rows = period.summary;
  if (search) rows = rows.filter(r => r.manager.toLowerCase().includes(search));

  // ── Build HTML ────────────────────────────────────────────
  let html = '';

  // Header
  html += '<div class="ved-header">'
    + '<h2>📋 Зарплатная ведомость — ' + MONTHS[period.month] + ' ' + period.year + '</h2>'
    + '<div class="sub">'
    + 'Файл: ' + (period.fileName||'—')
    + ' &nbsp;·&nbsp; Сохранён: ' + new Date(period.savedAt).toLocaleDateString('ru-RU')
    + ' &nbsp;·&nbsp; <span class="pill ' + stClass + '">' + (period.status||'черновик') + '</span>'
    + (isLive ? ' &nbsp;·&nbsp; <span class="pill py">⚡ Текущий расчёт</span>' : '')
    + '</div>'
    + '<div class="ved-totals">'
    + '<div class="ved-tot"><div class="lbl">Итого к выплате</div><div class="val g">' + fmt(totTotal) + ' EUR</div></div>'
    + '<div class="ved-tot"><div class="lbl">Фикс итого</div><div class="val">' + fmt(totFix) + ' EUR</div></div>'
    + '<div class="ved-tot"><div class="lbl">Бонус итого</div><div class="val b">' + fmt(totBonus) + ' EUR</div></div>'
    + '<div class="ved-tot"><div class="lbl">Провизион итого</div><div class="val v">' + fmt(totProv) + ' EUR</div></div>'
    + '<div class="ved-tot"><div class="lbl">Менеджеров</div><div class="val">' + period.summary.length + '</div></div>'
    + '<div class="ved-tot"><div class="lbl">Сделок в провизионе</div><div class="val">' + provDeals.length + '</div></div>'
    + '<div class="ved-tot"><div class="lbl">Дублей исключено</div><div class="val">' + dupDeals.length + '</div></div>'
    + '</div></div>';

  // JTL missing warning
  if (periodJtlMissing) {
    html += jtlWarningHtml('ved');
  }

  // Filter bar + period selector
  html += '<div class="ved-filter">'
    + '<label style="font-size:11px;color:#888;font-weight:600">Период:</label>'
    + '<select onchange="APP.vedPeriod=this.value;APP.vedOpenMgr=new Set();renderVed()">'
    + liveOption + selOptions
    + '</select>'
    + '<input type="text" placeholder="🔍 Поиск по менеджеру…" value="' + (APP.vedSearch||'') + '"'
    + ' oninput="APP.vedSearch=this.value;renderVed()" style="width:200px">'
    + (rows.length !== period.summary.length
      ? '<span style="font-size:11px;color:#888">Показано ' + rows.length + ' из ' + period.summary.length + '</span>'
      : '')
    + '</div>';

  // Errors block
  if (period.errors && period.errors.length) {
    html += '<div class="eb" style="margin-bottom:12px"><h4>⚠ Ошибки расчёта (' + period.errors.length + ')</h4><ul style="padding-left:16px;font-size:12px">'
      + period.errors.map(e => '<li><strong>' + e.manager + '</strong>: ' + e.issue + '</li>').join('')
      + '</ul></div>';
  }
  if (period.provErrors && period.provErrors.length) {
    html += '<div class="vb" style="margin-bottom:12px"><h4>💜 Провизион не настроен (' + period.provErrors.length + ')</h4><ul style="padding-left:16px;font-size:12px">'
      + period.provErrors.map(e => '<li><strong>' + e.manager + '</strong>: ' + e.issue + '</li>').join('')
      + '</ul></div>';
  }

  if (!rows.length) {
    html += '<div style="color:#aaa;padding:20px;text-align:center">Менеджеры не найдены.</div>';
    cont.innerHTML = html;
    return;
  }

  // Manager rows
  html += '<div>';
  rows.forEach(function(r) {
    const isOpen = APP.vedOpenMgr.has(r.manager);
    const av = (r.manager||'').split(/\s+/).map(function(w){return w[0]||'';}).join('').toUpperCase().substring(0,2) || '?';

    // Gather deals for this manager from period
    // Match deals by manager name - try ERP name first, then verkaeufer_name from registry
    const _mgrEntry = (APP.managers||[]).find(function(m){ return m.manager_name.trim()===r.manager.trim(); });
    const _mgrVk = _mgrEntry ? getVerkaeufer(_mgrEntry) : r.manager.trim();
    function _mgrMatch(d) {
      const vk = (d.verkaeufer||'').trim();
      return vk === r.manager.trim() || vk === _mgrVk;
    }
    const mDeals     = provDeals.filter(_mgrMatch);
    const mDupDeals  = dupDeals.filter(_mgrMatch);
    const mQuar      = ((period.quarDeals||[]).concat(period.manualDeals||[])).filter(_mgrMatch);

    html += '<div class="mgr-row">'
      + '<div class="mgr-row-head' + (isOpen?' open':'') + '" onclick="toggleVedMgr(\'' + r.manager.replace(/'/g,"\\'") + '\')">'
      + '<div class="mgr-avatar">' + av + '</div>'
      + '<div class="mgr-name">' + r.manager + (!r.inReport ? ' <span style="font-size:10px;color:#aaa">(нет продаж)</span>' : '') + '</div>'
      + '<div class="mgr-amounts">'
      + '<div class="mgr-amt"><div class="lbl">Фикс</div><div class="val fix">' + fmt(r.fixedSalary) + '</div></div>'
      + '<div class="mgr-amt"><div class="lbl">Бонус</div><div class="val bon">' + fmt(r.bonus||0) + '</div></div>'
      + '<div class="mgr-amt"><div class="lbl">Провизион</div><div class="val ' + (periodJtlMissing?'':'prv') + '">' + (periodJtlMissing?'<span style="color:#f59e0b;font-size:11px">н/р</span>':fmt(r.prov||0)) + '</div></div>'
      + '<div class="mgr-amt"><div class="lbl">' + (periodJtlMissing?'Итого без провизиона':'Итого EUR') + '</div><div class="val tot ' + (periodJtlMissing?'warn-val':'') + '">' + (periodJtlMissing?fmt(r.fixedSalary+(r.bonus||0)):fmt(r.total)) + '</div></div>'
      + '</div>'
      + '<div class="mgr-chevron' + (isOpen?' open':'') + '">▶</div>'
      + '</div>'
      + '<div class="mgr-detail' + (isOpen?' open':'') + '">'
      + buildMgrDetail(r, mDeals, mDupDeals, mQuar, period)
      + '</div>'
      + '</div>';
  });
  html += '</div>';

  // Summary totals row
  html += '<div style="background:#f0fff4;border:1.5px solid #a8e6b8;border-radius:10px;padding:14px 20px;margin-top:12px;display:flex;gap:24px;flex-wrap:wrap;align-items:center">'
    + '<strong style="flex:1;font-size:13px">Итого по периоду:</strong>'
    + '<span>Фикс: <strong class="tg">' + fmt(totFix) + ' EUR</strong></span>'
    + '<span>Бонус: <strong class="tb">' + fmt(totBonus) + ' EUR</strong></span>'
    + '<span>Провизион: <strong class="tv">' + fmt(totProv) + ' EUR</strong></span>'
    + '<span style="font-size:16px;font-weight:700;color:#1a1a2e">= ' + fmt(totTotal) + ' EUR</span>'
    + '</div>';

  cont.innerHTML = html;
}

function toggleVedMgr(name) {
  if (!APP.vedOpenMgr) APP.vedOpenMgr = new Set();
  if (APP.vedOpenMgr.has(name)) APP.vedOpenMgr.delete(name);
  else APP.vedOpenMgr.add(name);
  renderVed();
}

function buildMgrDetail(r, mDeals, mDupDeals, mQuar, period) {
  let h = '';

  // ── A. Фикс ─────────────────────────────────────────────
  h += '<div class="det-section">'
    + '<h4>💼 Фиксированная часть</h4>'
    + '<div class="det-row"><span class="lbl">База поступлений</span><span class="val">' + fmt(r.base||0) + ' EUR</span></div>'
    + '<div class="det-row"><span class="lbl">Правило</span><span class="val" style="font-size:11px;color:#666">' + (r.rule||'—') + '</span></div>'
    + '<div class="det-row"><span class="lbl">Фиксированный оклад</span><span class="val ok">' + fmt(r.fixedSalary) + ' EUR</span></div>'
    + '</div>';

  // ── B. Бонус ─────────────────────────────────────────────
  h += '<div class="det-section"><h4>🎯 Бонус</h4>';
  if (r.bonusSteps && r.bonusSteps.length) {
    r.bonusSteps.forEach(function(st) {
      if (st.reached) {
        h += '<span class="bonus-reached">≥ ' + fmt(st.планка) + ' EUR → +' + fmt(st.бонус) + ' EUR ✓</span>';
      } else {
        h += '<span class="bonus-missed">≥ ' + fmt(st.планка) + ' EUR → +' + fmt(st.бонус) + ' EUR</span>';
      }
    });
    h += '<div class="det-row" style="margin-top:8px"><span class="lbl">Итого бонус</span><span class="val hi">' + fmt(r.bonus||0) + ' EUR</span></div>';
  } else if (r.bonusDetail) {
    h += '<div class="det-row"><span class="lbl">Достигнутые планки</span><span class="val" style="font-size:11px;color:#1e40af">' + r.bonusDetail + '</span></div>'
      + '<div class="det-row"><span class="lbl">Итого бонус</span><span class="val hi">' + fmt(r.bonus||0) + ' EUR</span></div>';
  } else {
    h += '<div class="det-row"><span class="lbl">Бонус</span><span class="val nm">' + fmt(r.bonus||0) + ' EUR</span></div>';
  }
  h += '</div>';

  // ── C. Провизион ─────────────────────────────────────────
  // Check if JTL missing for this period context
  const _jtlM = (typeof periodJtlMissing !== 'undefined') ? periodJtlMissing : false;
  h += '<div class="det-section"><h4>💜 Провизион</h4>';
  if (_jtlM) {
    h += '<div style="background:#fef3c7;border:1px solid #f59e0b;border-radius:8px;padding:10px 12px;font-size:12px;color:#92400e">'
      + '⚠️ <strong>Провизион не рассчитан</strong> — JTL-выгрузка за этот период не была загружена.'
      + '</div>';
  } else {
    h += '<div class="det-row"><span class="lbl">База провизиона (сделки)</span><span class="val pv">' + fmt(r.provBase||0) + ' EUR</span></div>'
      + '<div class="det-row"><span class="lbl">Правило</span><span class="val" style="font-size:11px;color:#6d28d9">' + (r.provRule || (r.prov > 0 ? '—' : 'провизион не настроен')) + '</span></div>'
      + '<div class="det-row"><span class="lbl">Итого провизион</span><span class="val pv">' + fmt(r.prov||0) + ' EUR</span></div>';
  }
  h += '</div>';

  // ── D. Сделки ─────────────────────────────────────────────
  if (mDeals.length || mDupDeals.length || mQuar.length) {
    h += '<div class="det-section"><h4>📦 Сделки</h4>';

    if (mDeals.length) {
      h += '<div style="margin-bottom:6px;font-size:11px;color:#888;font-weight:600">Вошли в провизион (' + mDeals.length + '):</div>';
      mDeals.forEach(function(d) {
        const isJoint = d.joint && d.joint.length;
        const myShare = isJoint ? d.joint.find(function(s){ return s.manager.trim() === r.manager.trim(); }) : null;
        h += '<span class="deal-chip' + (isJoint?' joint':'') + '">'
          + '<strong>' + d.bestellnummer + '</strong>'
          + ' &nbsp; ' + fmt(d.gesamtbetrag||0) + ' EUR'
          + (isJoint ? ' &nbsp; <span style="color:#6d28d9">(' + (myShare ? myShare.pct + '% доля' : 'совместная') + ')</span>' : '')
          + '</span>';
      });
    }

    if (mDupDeals.length) {
      h += '<div style="margin-top:8px;margin-bottom:6px;font-size:11px;color:#b91c1c;font-weight:600">Исключены как дубли (' + mDupDeals.length + '):</div>';
      mDupDeals.forEach(function(d) {
        h += '<span class="deal-chip dup">'
          + '<strong>' + d.bestellnummer + '</strong>'
          + ' — ' + (d.reason||'дубль')
          + '</span>';
      });
    }

    if (mQuar.length) {
      h += '<div style="margin-top:8px;margin-bottom:6px;font-size:11px;color:#856404;font-weight:600">Карантин / Ручная проверка (' + mQuar.length + '):</div>';
      mQuar.forEach(function(d) {
        h += '<span class="deal-chip" style="background:#fffbeb;border-color:#fcd34d">'
          + '<strong>' + d.bestellnummer + '</strong>'
          + ' — ' + (d.reason||'карантин')
          + '</span>';
      });
    }

    h += '</div>';
  }

  // ── E. Итого по менеджеру ─────────────────────────────────
  h += '<div style="background:#f0fff4;border-radius:8px;padding:10px 14px;display:flex;gap:20px;flex-wrap:wrap;align-items:center">'
    + '<strong style="font-size:12px">Итого к выплате:</strong>'
    + '<span style="font-size:11px;color:#666">Фикс <strong class="tg">' + fmt(r.fixedSalary) + '</strong></span>'
    + '<span style="font-size:11px;color:#666">+ Бонус <strong class="tb">' + fmt(r.bonus||0) + '</strong></span>'
    + '<span style="font-size:11px;color:#666">+ Провизион <strong class="tv">' + fmt(r.prov||0) + '</strong></span>'
    + '<span style="font-size:16px;font-weight:700;color:#1a1a2e">= ' + fmt(r.total) + ' EUR</span>'
    + '</div>';

  return h;
}
</script>
