<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sales Payroll MVP v0.7</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header>
    <h1>💰 Sales Payroll MVP</h1>
    <p>v0.7 · Фикс + Бонус + Провизион (pipeline) + Дедупликация + История · Frontend only</p>
  </header>

  <div class="ua" id="ua">
    <div class="ico">📂</div>
    <p>Загрузите Excel-файл отчёта по поступлениям (для расчёта фикса)</p>
    <p class="hint">.xlsx — выгрузка из ERP/1С</p>
    <label><input type="file" id="fi" accept=".xlsx,.xls" hidden><span class="bup">Выбрать файл</span></label>
  </div>

  <div class="panel" id="mainPanel">
    <div class="tabs">
      <button class="tab active" data-tab="overview">Обзор</button>
      <button class="tab" data-tab="fixed">🧮 Реестр выплат</button>
      <button class="tab" data-tab="prov">📦 Провизион</button>
      <button class="tab" data-tab="dedup">🔍 Дубли оплат</button>
      <button class="tab" data-tab="history">📅 История</button>
      <button class="tab" data-tab="dir">⚙️ Менеджеры</button>
      <button class="tab" data-tab="preview">Предпросмотр</button>
      <button class="tab" data-tab="structure">Структура</button>
    </div>

    <div class="pane active" id="pane-overview"><div id="overviewContent"></div></div>
    <div class="pane" id="pane-fixed"><div id="fpc"></div></div>

    <!-- Provizion tab with its own sub-tabs -->
    <div class="pane" id="pane-prov">
      <div class="tabs" style="margin-bottom:16px">
        <button class="tab active" data-subtab="provDeals" onclick="switchProvTab('provDeals')">Реестр сделок</button>
        <button class="tab" data-subtab="provSettings" onclick="switchProvTab('provSettings')">Настройки платформ</button>
      </div>
      <div id="provContent"></div>
      <div id="provSettingsContent" style="display:none"></div>
    </div>

    <div class="pane" id="pane-dedup"><div id="dedupContent"></div></div>
    <div class="pane" id="pane-history"><div id="historyContent"></div></div>
    <div class="pane" id="pane-dir"><div id="dirc"></div></div>
    <div class="pane" id="pane-preview"><div id="pvc"></div></div>
    <div class="pane" id="pane-structure"><div id="stc"></div></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script src="storage.js"></script>
<script src="payroll.js"></script>
<script src="provizion.js"></script>
<script src="app.js"></script>
<script>
// Extended init to include provizion
document.addEventListener('DOMContentLoaded', () => {
  STATE.managers = loadManagers();
  STATE.dedup    = loadDedupRegistry();
  STATE.history  = loadHistory();
  initProv();
  initTabs();
  initUpload();
  renderDir();
  renderHistoryList();
  // Load existing deals from storage
  PROV.deals = loadDeals();
  document.getElementById('mainPanel').style.display = 'none';
  // Show main panel always (for provizion even without xlsx)
  document.getElementById('mainPanel').style.display = 'block';
});

function switchProvTab(tab) {
  document.querySelectorAll('[data-subtab]').forEach(b => b.classList.toggle('active', b.dataset.subtab === tab));
  document.getElementById('provContent').style.display = tab === 'provDeals' ? '' : 'none';
  document.getElementById('provSettingsContent').style.display = tab === 'provSettings' ? '' : 'none';
  if (tab === 'provDeals') renderProvizion();
  if (tab === 'provSettings') renderProvSettings();
}

// Override switchTab to handle prov tab
const _origSwitchTab = switchTab;
function switchTab(tab) {
  _origSwitchTab(tab);
  if (tab === 'prov') { renderProvizion(); renderProvSettings(); }
}
</script>
</body>
</html>
